<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренажёр азбуки Меченова-Кадачиговой</title>

    <!-- 🖐️ Эмодзи-фавикон -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖐️</text></svg>" />

    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #1a1a2e;
            --surface-light: #22223a;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #5b8def;
            --accent-glow: #7aa4ff;
            --success: #4caf84;
            --success-glow: #6fe0a8;
            --error: #e0556a;
            --error-glow: #ff7b8a;
            --gold: #f0c060;
            --gold-glow: #ffd780;
            --finger-up: #2a2a44;
            --finger-up-border: #4a4a68;
            --finger-down: #5b8def;
            --finger-down-glow: #8ab4ff;
            --finger-target: #3a3a58;
            --finger-target-active: #5b8def33;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
            --result-duration: 0.6s;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 50% 30%, #1a1a40 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, #0d0d22 0%, transparent 60%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 620px;
            padding: 24px 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding-bottom: 24px;
        }
        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--text);
            line-height: 1.3;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 30px;
            padding: 10px 18px;
            transition: border-color 0s, box-shadow 0s;
        }
        .badge-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            min-width: 30px;
            text-align: center;
            transition: color 0s;
        }

        @keyframes glowCorrect {
            0% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
            10% {
                color: var(--success);
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            25% {
                transform: scale(1.08);
            }
            55% {
                transform: scale(1.03);
            }
            90% {
                color: var(--success);
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            100% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
        }
        @keyframes glowError {
            0% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: translateX(0);
            }
            10% {
                color: var(--error);
                border-color: var(--error);
                box-shadow: 0 0 20px rgba(224, 85, 106, 0.5);
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(3px);
            }
            90% {
                color: var(--error);
                border-color: var(--error);
                box-shadow: 0 0 20px rgba(224, 85, 106, 0.5);
                transform: translateX(0);
            }
            100% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: translateX(0);
            }
        }

        @keyframes glowRecordCorrectMove {
            0% {
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
            10% {
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            25% {
                transform: scale(1.08);
            }
            55% {
                transform: scale(1.03);
            }
            90% {
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            100% {
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
        }
        @keyframes glowCorrectValue {
            0% {
                color: var(--gold);
            }
            10% {
                color: var(--success);
            }
            90% {
                color: var(--success);
            }
            100% {
                color: var(--gold);
            }
        }
        @keyframes glowErrorValue {
            0% {
                color: var(--gold);
            }
            10% {
                color: var(--error);
            }
            90% {
                color: var(--error);
            }
            100% {
                color: var(--gold);
            }
        }
        @keyframes streakPulse {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.08);
            }
            60% {
                transform: scale(1.03);
            }
        }

        .streak-badge.correct-streak {
            animation: glowCorrect var(--result-duration) ease forwards;
        }
        .streak-badge.error-streak {
            animation: glowError var(--result-duration) ease forwards;
        }
        .streak-badge.flash {
            animation: streakPulse var(--result-duration) ease-out;
        }
        .record-badge.record-correct {
            animation: glowRecordCorrectMove var(--result-duration) ease forwards;
        }
        .badge-value.glow-correct {
            animation: glowCorrectValue var(--result-duration) ease forwards;
        }
        .badge-value.glow-error {
            animation: glowErrorValue var(--result-duration) ease forwards;
        }

        .badge-icon {
            font-size: 1.5rem;
        }
        .hint-badge {
            width: fit-content;
            max-width: 100%;
            flex-shrink: 1;
            min-width: 0;
        }
        .hint-badge .badge-icon {
            font-size: 1.5rem;
        }
        .hint-badge .badge-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: auto;
            text-align: left;
            white-space: normal;
            line-height: 1.3;
            max-width: 160px;
        }
        .menu-btn {
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.5rem;
            transition: all var(--transition);
            padding: 0;
            line-height: 1;
            position: relative;
            flex-shrink: 0;
        }
        .menu-btn:hover {
            background: #2a2a48;
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .menu-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: var(--radius-sm);
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            min-width: 210px;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
        }
        .menu-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
            pointer-events: auto;
        }
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 2px;
        }
        .menu-section-header {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 10px 4px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
            user-select: none;
        }
        .menu-section-header .section-arrow {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .menu-divider {
            height: 1px;
            background: #2a2a48;
            margin: 6px 6px;
        }
        .menu-item {
            background: transparent;
            border: 2px solid transparent;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            width: 100%;
            text-align: left;
            font-family: var(--font);
        }
        .menu-item:hover {
            background: #2a2a48;
            border-color: transparent;
        }
        .menu-item.active {
            background: #2a2a40;
            border-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .menu-item-radio {
            font-size: 0.9rem;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
            color: var(--text-secondary);
            transition: color var(--transition);
        }
        .menu-item-radio.active {
            color: var(--accent-glow);
        }
        .menu-item-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .menu-item-label {
            flex: 1;
        }

        @keyframes mainCardCorrect {
            0% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            10% {
                border-color: var(--success);
                box-shadow: 0 0 60px rgba(76, 175, 132, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            90% {
                border-color: var(--success);
                box-shadow: 0 0 60px rgba(76, 175, 132, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            100% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
        }
        @keyframes mainCardError {
            0% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            10% {
                border-color: var(--error);
                box-shadow: 0 0 60px rgba(224, 85, 106, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            90% {
                border-color: var(--error);
                box-shadow: 0 0 60px rgba(224, 85, 106, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            100% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
        }
        .main-card {
            background: var(--surface);
            border: 1px solid #2a2a48;
            border-radius: var(--radius);
            padding: 32px 28px 24px;
            text-align: center;
            position: relative;
            transition: border-color 0s, box-shadow 0s;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
        }
        .main-card.correct-flash {
            animation: mainCardCorrect var(--result-duration) ease forwards;
        }
        .main-card.error-flash {
            animation: mainCardError var(--result-duration) ease forwards;
        }

        .letter-display {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
            transition: color 0.25s ease, transform 0.3s ease;
            color: var(--text);
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform, color;
            margin-bottom: 16px;
        }
        /* Поднимаем букву вверх в режиме отправки, чтобы выносные элементы не перекрывали статус */
        .main-card.send-mode .letter-display {
            position: relative;
            top: -6px;
        }
        .letter-display.correct {
            color: var(--success);
            animation: letterPop 0.4s ease-out;
        }
        .letter-display.error {
            color: var(--error);
            animation: letterShake 0.4s ease-out;
        }
        .letter-display.timer-active {
            color: #f0c060;
            transform: scale(1.12);
            transition: color 0.8s linear, transform 0.8s ease-out;
        }
        .letter-display.reveal {
            color: #ffffff;
        }
        @keyframes letterPop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.15);
            }
            60% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes letterShake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        @keyframes statusSuccess {
            0% {
                color: var(--text);
            }
            10% {
                color: var(--success);
            }
            90% {
                color: var(--success);
            }
            100% {
                color: var(--text);
            }
        }
        @keyframes statusFail {
            0% {
                color: var(--text);
            }
            10% {
                color: var(--error);
            }
            90% {
                color: var(--error);
            }
            100% {
                color: var(--text);
            }
        }
        .status-text {
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 24px;
            letter-spacing: 0.05em;
            color: var(--text);
            transition: color 0s;
        }
        .status-text.success {
            animation: statusSuccess var(--result-duration) ease forwards;
        }
        .status-text.fail {
            animation: statusFail var(--result-duration) ease forwards;
        }
        .status-text.warning {
            color: var(--gold);
        }
        .status-text.info {
            color: var(--text-secondary);
        }

        .patterns-section {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        .pattern-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }
        .pattern-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 90px;
            text-align: right;
            flex-shrink: 0;
        }
        .finger-dots {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .finger-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .target-dot {
            background: var(--finger-target);
            border: 2px solid #3a3a5c;
            color: #7777a0;
        }
        .target-dot.active {
            background: #3a4a70;
            border-color: #5b8def88;
            color: #bcc8e8;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.2);
        }
        .input-dot {
            background: var(--finger-up);
            border: 2px solid var(--finger-up-border);
            color: #8888aa;
        }
        .input-dot.pressed {
            background: var(--finger-down);
            border-color: var(--finger-down-glow);
            color: #fff;
            box-shadow: 0 0 18px rgba(91, 141, 239, 0.5);
            transform: scale(1.08);
            animation: dotPress 0.2s ease-out;
        }
        @keyframes dotPress {
            0% {
                transform: scale(0.85);
            }
            60% {
                transform: scale(1.12);
            }
            100% {
                transform: scale(1.08);
            }
        }
        .hint-row-wrapper {
            overflow: visible;
            max-height: 80px;
            opacity: 1;
            transition: max-height 0.35s ease, opacity 0.35s ease, margin 0.35s ease;
        }
        .hint-row-wrapper.hint-hidden {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            margin-bottom: 0;
            pointer-events: none;
        }
        .instructions-wrapper {
            overflow: hidden;
            max-height: 600px;
            opacity: 1;
            transition: max-height 0.35s ease, opacity 0.35s ease, margin 0.35s ease;
            margin-top: 18px;
            width: 100%;
        }
        .instructions-wrapper.hint-hidden {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            margin-bottom: 0;
            pointer-events: none;
        }
        .hint-placeholder {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .instruction-row .hint-placeholder {
            width: 80px;
        }
        .pattern-row .hint-placeholder {
            width: 90px;
        }
        .instruction-box {
            background: var(--surface);
            border: 1px solid #2a2a40;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .instruction-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 420px;
        }
        .row-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 80px;
            text-align: right;
            flex-shrink: 0;
        }
        .key-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #252540;
            border: 1px solid #3a3a58;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.7rem;
            color: #ccd;
            letter-spacing: 0.04em;
            text-align: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .key-badge.highlight {
            border-color: var(--accent);
            color: var(--accent-glow);
            background: #1f2a40;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .receive-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .receive-dots {
            gap: 10px;
            margin: 0 auto;
        }
        .receive-dot {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--finger-target);
            border: 2px solid #3a3a5c;
            transition: all var(--transition);
        }
        .receive-dot.lit {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
        }
        .receive-dot.correct {
            background: var(--success);
            border-color: var(--success-glow);
            box-shadow: 0 0 20px rgba(76, 175, 132, 0.7);
        }
        .receive-dot.error {
            background: var(--error);
            border-color: var(--error-glow);
            box-shadow: 0 0 20px rgba(224, 85, 106, 0.7);
        }

        .decoding-table-wrap {
            width: 100%;
            max-height: 158px;
            overflow-y: auto;
            padding: 0 2px;
            scrollbar-width: thin;
            scrollbar-color: #3a3a5c transparent;
            border-radius: 4px;
        }
        .decoding-table-wrap::-webkit-scrollbar {
            width: 4px;
        }
        .decoding-table-wrap::-webkit-scrollbar-track {
            background: transparent;
        }
        .decoding-table-wrap::-webkit-scrollbar-thumb {
            background: #3a3a5c;
            border-radius: 8px;
        }
        .decoding-block {
            margin-bottom: 26px;
            width: 100%;
        }
        .decoding-block:last-child {
            margin-bottom: 0;
        }
        .decoding-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            table-layout: fixed;
        }
        .decoding-table td,
        .decoding-table th {
            border: 1px solid #2a2a48;
            padding: 2px 1px;
            text-align: center;
            vertical-align: middle;
            height: 26px;
            background: #12122a;
            transition: border-color 0.2s;
        }
        .decoding-table .finger-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.6rem;
            letter-spacing: 0.04em;
            background: #1a1a34;
        }
        .decoding-table .letter-cell {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
            background: #16162e;
            cursor: pointer;
            transition: background 0.15s;
        }
        .decoding-table .letter-cell:hover {
            background: #2a2a4a;
        }

    <script>
        (function() {
            // ======================== SFX ========================
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;
            let soundEnabled = true;

            let lastClickTime = 0;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            function _playClick() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05);
                } catch (_) {}
            }

            function playClickSafe() {
                const now = performance.now();
                if (now - lastClickTime < 50) return;
                lastClickTime = now;
                _playClick();
            }

            function playCorrect() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const osc1 = ctx.createOscillator();
                    const g1 = ctx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                    g1.gain.setValueAtTime(0.25, ctx.currentTime);
                    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.10);
                    osc1.connect(g1);
                    g1.connect(ctx.destination);
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.10);

                    setTimeout(() => {
                        if (!soundEnabled) return;
                        try {
                            const osc2 = ctx.createOscillator();
                            const g2 = ctx.createGain();
                            osc2.type = 'sine';
                            osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
                            g2.gain.setValueAtTime(0.22, ctx.currentTime);
                            g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                            osc2.connect(g2);
                            g2.connect(ctx.destination);
                            osc2.start(ctx.currentTime);
                            osc2.stop(ctx.currentTime + 0.12);
                        } catch (_) {}
                    }, 80);
                } catch (_) {}
            }

            function playWrong() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const osc1 = ctx.createOscillator();
                    const g1 = ctx.createGain();
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(440.00, ctx.currentTime);
                    g1.gain.setValueAtTime(0.15, ctx.currentTime);
                    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc1.connect(g1);
                    g1.connect(ctx.destination);
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.12);

                    setTimeout(() => {
                        if (!soundEnabled) return;
                        try {
                            const osc2 = ctx.createOscillator();
                            const g2 = ctx.createGain();
                            osc2.type = 'sawtooth';
                            osc2.frequency.setValueAtTime(349.23, ctx.currentTime);
                            g2.gain.setValueAtTime(0.15, ctx.currentTime);
                            g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                            osc2.connect(g2);
                            g2.connect(ctx.destination);
                            osc2.start(ctx.currentTime);
                            osc2.stop(ctx.currentTime + 0.15);
                        } catch (_) {}
                    }, 100);
                } catch (_) {}
            }

            function playStreak() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const notes = [523.25, 659.25, 783.99];
                    const times = [0, 100, 200];
                    notes.forEach((freq, i) => {
                        setTimeout(() => {
                            if (!soundEnabled) return;
                            try {
                                const osc = ctx.createOscillator();
                                const g = ctx.createGain();
                                osc.type = 'sine';
                                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                                const dur = i === 2 ? 0.12 : 0.08;
                                g.gain.setValueAtTime(i === 2 ? 0.25 : 0.20, ctx.currentTime);
                                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                                osc.connect(g);
                                g.connect(ctx.destination);
                                osc.start(ctx.currentTime);
                                osc.stop(ctx.currentTime + dur);
                            } catch (_) {}
                        }, times[i]);
                    });
                } catch (_) {}
            }

            // ======================== MAPS ========================
            const codeToRussianMap = {
                'KeyQ': 'Й',
                'KeyW': 'Ц',
                'KeyE': 'У',
                'KeyR': 'К',
                'KeyT': 'Е',
                'KeyY': 'Н',

                'KeyB': 'И',
                'KeyN': 'Т',
                'KeyM': 'Ь',
                'Comma': 'Б',
                'Period': 'Ю'
            };

            const letterCodes = {
                'А': '10000',
                'Е': '01000',
                'О': '00100',
                'И': '00010',
                'Т': '00001',
                'Н': '11000',
