                'Г': '11010',
                'З': '11001',
                'Б': '10110',
                'Ч': '10011',
                'Й': '01011',
                'Х': '10101',
                'Ж': '01101',
                'Ш': '11110',
                'Ю': '01111',
                'Ц': '10111',
                'Щ': '11011',
                'Э': '11111',
                'Ф': '11101'
            };
            const allLetters = Object.keys(letterCodes);

            const defaultTop = ['Т', 'И', 'В', 'О', 'У', 'Р', 'Ь', 'Е', 'П', 'Д', 'Й', 'С', 'Ж', 'Ы', 'Ю'];
            const defaultBottom = ['А', 'М', 'К', 'Ч', 'Л', 'Х', 'Б', 'Ц', 'Н', 'З', 'Г', 'Щ', 'Я', 'Ф', 'Ш', 'Э'];
            const fingerNames = ['Бп', 'У', 'С', 'Б', 'М'];

            const keyToBitRight = { 'Space': 0, 'KeyJ': 1, 'KeyK': 2, 'KeyL': 3, 'Semicolon': 4 };
            const keyToBitLeft = { 'Space': 0, 'KeyF': 1, 'KeyD': 2, 'KeyS': 3, 'KeyA': 4 };
            const rightOnly = new Set(['KeyJ', 'KeyK', 'KeyL', 'Semicolon']);
            const leftOnly = new Set(['KeyF', 'KeyD', 'KeyS', 'KeyA']);
            const allRelevantCodes = new Set([...Object.keys(keyToBitRight), ...Object.keys(keyToBitLeft)]);

            // ======================== DOM refs ========================
            const letterDisplay = document.getElementById('letterDisplay');
            const receiveArea = document.getElementById('receiveArea');
            const receiveDotsContainer = document.getElementById('receiveDots');
            const receiveDots = [...receiveDotsContainer.children];
            const receiveLetterDisplay = document.getElementById('receiveLetterDisplay');
            const mainCard = document.getElementById('mainCard');
            const streakBadge = document.getElementById('streakBadge');
            const streakValue = document.getElementById('streakValue');
            const recordBadge = document.getElementById('recordBadge');
            const recordValue = document.getElementById('recordValue');
            const statusText = document.getElementById('statusText');
            const targetDotsContainer = document.getElementById('targetDots');
            const inputDotsContainer = document.getElementById('inputDots');
            const hintWrapper = document.getElementById('hintWrapper');
            const instructionsWrapper = document.getElementById('instructionsWrapper');
            const instructionKeyboard = document.getElementById('instructionKeyboard');
            const decodingTableContainer = document.getElementById('decodingTableContainer');
            const decodingTableWrap = document.getElementById('decodingTableWrap');
            const alphabetButtons = document.getElementById('alphabetButtons');
            const alphabetGrid = document.getElementById('alphabetGrid');
            const menuBtn = document.getElementById('menuBtn');
            const menuDropdown = document.getElementById('menuDropdown');
            const menuHintToggle = document.getElementById('menuHintToggle');
            const menuHintIcon = document.getElementById('menuHintIcon');
            const menuHintLabel = document.getElementById('menuHintLabel');
            const menuInfo = document.getElementById('menuInfo');
            const menuSoundToggle = document.getElementById('menuSoundToggle');
            const menuSoundIcon = document.getElementById('menuSoundIcon');
            const menuSoundLabel = document.getElementById('menuSoundLabel');
            const hintBadge = document.getElementById('hintBadge');
            const hintBadgeValue = document.getElementById('hintBadgeValue');
            const mouseConfirmWrapper = document.getElementById('mouseConfirmWrapper');
            const mouseConfirmBtn = document.getElementById('mouseConfirmBtn');
            const mouseResetBtn = document.getElementById('mouseResetBtn');
            const positionLabel = document.getElementById('positionLabel');
            const modeSendArea = document.getElementById('modeSendArea');
            const patternsSection = document.getElementById('patternsSection');

            const radioSend = document.getElementById('radioSend');
            const radioReceive = document.getElementById('radioReceive');
            const modeItems = document.querySelectorAll('.mode-item');

            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            const TIMER_DURATION = 800;
            const RESULT_DISPLAY = 600;
            const RELEASE_DELAY = 5000;
            const STORAGE_KEY = 'azbukaRecord';

            let mode = 'send';
            let currentLetter = null;
            let currentCode = null;
            let streak = 0;
            let record = 0;
            let state = 'idle';
            let evaluationTimeoutId = null;
            let resultTimeoutId = null;
            let releaseTimeoutId = null;
            let revealTimeoutId = null;
            let statusTimeoutId = null; // таймер для автоочистки статуса
            let hintVisible = true;
            const pressedKeys = new Set();
            let activeHand = 'right';
            let receiveKeyIsDown = false;
            let isSorted = false;

            let isMouseInput = false;
            let mouseInputBits = [0, 0, 0, 0, 0];
            let lastSendInputMode = isTouchDevice ? true : false;

            // Флаг для предотвращения двойного срабатывания touch/click
            let touchHandled = false;

            function getTargetDots() { return [...targetDotsContainer.children]; }
            function getInputDots() { return [...inputDotsContainer.children]; }

            function updateFingerLabels() {
                const targetDots = getTargetDots();
                const inputDots = getInputDots();
                const fingerOrder = activeHand === 'right' ? [0, 1, 2, 3, 4] : [4, 3, 2, 1, 0];
                const labels = activeHand === 'right' ? ['Бп', 'У', 'С', 'Б', 'М'] : ['М', 'Б', 'С', 'У', 'Бп'];
                for (let i = 0; i < 5; i++) {
                    const f = fingerOrder[i];
                    targetDots[i].setAttribute('data-finger', f);
                    targetDots[i].textContent = labels[i];
                    inputDots[i].setAttribute('data-finger', f);
                    inputDots[i].textContent = labels[i];
                }
            }

            function updateInstruction() {
                const rightKeys = ['SPC', 'J', 'K', 'L', ':'];
                const leftKeys = ['SPC', 'F', 'D', 'S', 'A'];
                let topKeys, topLabel, bottomKeys, bottomLabel;
                if (activeHand === 'right') {
                    topKeys = rightKeys;
                    topLabel = 'Правая рука';
                    bottomKeys = leftKeys;
                    bottomLabel = 'Левая рука';
                } else {
                    topKeys = leftKeys;
                    topLabel = 'Левая рука';
                    bottomKeys = rightKeys.slice().reverse();
                    bottomLabel = 'Правая рука';
                }
                const topRow = document.getElementById('instructionRowTop');
                const bottomRow = document.getElementById('instructionRowBottom');
                if (topRow) {
                    topRow.innerHTML =
                        `<span class="row-label">${topLabel}</span>` +
                        topKeys.map(k => `<span class="key-badge highlight">${k}</span>`).join('') +
                        `<div class="hint-placeholder"></div>`;
                }
                if (bottomRow) {
                    bottomRow.innerHTML =
                        `<span class="row-label">${bottomLabel}</span>` +
                        bottomKeys.map(k => `<span class="key-badge">${k}</span>`).join('') +
                        `<div class="hint-placeholder"></div>`;
                }
            }

            function updateHintWarning() {
                if (hintVisible) {
                    recordBadge.style.display = 'none';
                    hintBadge.style.display = 'flex';
                } else {
                    recordBadge.style.display = 'flex';
                    hintBadge.style.display = 'none';
                }
            }

            function buildDecodingTable() {
                const wrap = decodingTableWrap;
                wrap.innerHTML = '';

                let topLetters, bottomLetters;
                if (isSorted) {
                    const sorted = allLetters.slice().sort((a, b) => a.localeCompare(b, 'ru'));
                    topLetters = sorted.slice(0, 15);
                    bottomLetters = sorted.slice(15, 31);
                } else {
                    topLetters = defaultTop.slice();
                    bottomLetters = defaultBottom.slice();
                }

                function getCodesForLetters(letters) {
                    const codes = { 'Бп': [], 'У': [], 'С': [], 'Б': [], 'М': [] };
                    for (let letter of letters) {
                        const code = letterCodes[letter];
                        if (!code) continue;
                        const bits = code.split('').map(Number);
                        codes['Бп'].push(bits[0]);
                        codes['У'].push(bits[1]);
                        codes['С'].push(bits[2]);
                        codes['Б'].push(bits[3]);
                        codes['М'].push(bits[4]);
                    }
                    return codes;
                }

                const topBlock = document.createElement('div');
                topBlock.className = 'decoding-block';
                const tableTop = document.createElement('table');
                tableTop.className = 'decoding-table';
                const topCodes = getCodesForLetters(topLetters);
                const colCountTop = topLetters.length;

                for (let row = 0; row < 5; row++) {
                    const tr = document.createElement('tr');
                    const finger = fingerNames[row];
                    const codes = topCodes[finger];
                    const th = document.createElement('th');
                    th.className = 'finger-label';
                    th.textContent = finger;
                    tr.appendChild(th);
                    for (let col = 0; col < colCountTop; col++) {
                        const td = document.createElement('td');
                        td.className = 'dot-cell';
                        td.dataset.letter = topLetters[col];
                        const dot = document.createElement('div');
                        dot.className = 'decoding-dot' + (codes[col] === 1 ? ' filled' : ' empty');
                        td.appendChild(dot);
                        tr.appendChild(td);
                    }
                    tableTop.appendChild(tr);
                }

                const trLetters = document.createElement('tr');
                const thSort = document.createElement('th');
                thSort.className = 'sort-cell' + (isSorted ? ' active' : '');
                const btn = document.createElement('button');
                btn.className = 'sort-btn';
                btn.textContent = '⇄';
                btn.title = 'Переключить порядок букв';
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    isSorted = !isSorted;
                    buildDecodingTable();
                });
                thSort.appendChild(btn);
                trLetters.appendChild(thSort);
                for (let col = 0; col < colCountTop; col++) {
                    const td = document.createElement('td');
                    td.className = 'letter-cell';
                    td.dataset.letter = topLetters[col];
                    td.textContent = topLetters[col];
                    trLetters.appendChild(td);
                }
                tableTop.appendChild(trLetters);
                topBlock.appendChild(tableTop);
                wrap.appendChild(topBlock);

                const bottomBlock = document.createElement('div');
                bottomBlock.className = 'decoding-block';
                const tableBottom = document.createElement('table');
                tableBottom.className = 'decoding-table';
                const bottomCodes = getCodesForLetters(bottomLetters);
                const colCountBottom = bottomLetters.length;

                for (let row = 0; row < 5; row++) {
                    const tr = document.createElement('tr');
                    const codes = bottomCodes[fingerNames[row]];
                    for (let col = 0; col < colCountBottom; col++) {
                        const td = document.createElement('td');
                        td.className = 'dot-cell';
                        td.dataset.letter = bottomLetters[col];
                        const dot = document.createElement('div');
                        dot.className = 'decoding-dot' + (codes[col] === 1 ? ' filled' : ' empty');
                        td.appendChild(dot);
                        tr.appendChild(td);
                    }
                    tableBottom.appendChild(tr);
                }

                const trBottomLetters = document.createElement('tr');
                for (let col = 0; col < colCountBottom; col++) {
                    const td = document.createElement('td');
                    td.className = 'letter-cell';
                    td.dataset.letter = bottomLetters[col];
                    td.textContent = bottomLetters[col];
                    trBottomLetters.appendChild(td);
                }
                tableBottom.appendChild(trBottomLetters);
                bottomBlock.appendChild(tableBottom);
                wrap.appendChild(bottomBlock);
            }

            function buildAlphabetButtons() {
                alphabetGrid.innerHTML = '';
                const sorted = allLetters.slice().sort((a, b) => a.localeCompare(b, 'ru'));
                for (let letter of sorted) {
                    const btn = document.createElement('button');
                    btn.className = 'alphabet-btn';
                    btn.textContent = letter;
                    btn.dataset.letter = letter;
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleMouseReceive(letter);
                    });
                    alphabetGrid.appendChild(btn);
                }
            }

            function updateMouseDots() {
                getInputDots().forEach(d => {
                    const f = parseInt(d.getAttribute('data-finger'), 10);
                    if (mouseInputBits[f]) d.classList.add('pressed');
                    else d.classList.remove('pressed');
                });
            }

            function resetMouseInput() {
                mouseInputBits = [0, 0, 0, 0, 0];
                updateMouseDots();
            }

            function activateMouseInput() {
                if (mode !== 'send' || isMouseInput) return;
                activeHand = 'right';
                updateFingerLabels();
                updateInstruction();
                if (currentCode) updateTargetDots(currentCode);
                isMouseInput = true;
                pressedKeys.clear();
                resetMouseInput();
                updateMouseUI();
                inputDotsContainer.classList.add('mouse-active');
                clearAllTimeouts();
                state = 'idle';
                setStatus('', '');
                if (currentCode) updateTargetDots(currentCode);
                lastSendInputMode = true;
            }

            function deactivateMouseInput() {
                isMouseInput = false;
                updateKeyboardUI();
                inputDotsContainer.classList.remove('mouse-active');
                resetMouseInput();
                pressedKeys.clear();
                updateInputDots();
                if (state === 'result') {
                    clearAllTimeouts();
                    state = 'idle';
                }
                lastSendInputMode = false;
                if (mode === 'send') {
                    instructionsWrapper.classList.toggle('hint-hidden', !hintVisible);
                }
            }

            function updateMouseUI() {
                instructionKeyboard.style.display = 'none';
                decodingTableContainer.style.display = 'none';
                alphabetButtons.style.display = 'none';
                mouseConfirmWrapper.style.display = 'flex';
                instructionsWrapper.style.display = 'none';
            }

            function updateKeyboardUI() {
                mouseConfirmWrapper.style.display = 'none';
                instructionsWrapper.style.display = '';
                if (mode === 'send') {
                    instructionKeyboard.style.display = hintVisible ? 'flex' : 'none';
                    decodingTableContainer.style.display = 'none';
                    alphabetButtons.style.display = 'none';
                } else if (mode === 'receive') {
                    instructionKeyboard.style.display = 'none';
                    if (hintVisible) {
                        decodingTableContainer.style.display = 'block';
                        alphabetButtons.style.display = 'none';
                        buildDecodingTable();
                    } else {
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'flex';
                        buildAlphabetButtons();
                    }
                }
            }

            function handleMouseConfirm() {
                if (!isMouseInput || mode !== 'send' || state !== 'idle') return;
                if (!currentLetter || !currentCode) return;
                const inputCode = mouseInputBits.join('');
                const isCorrect = (inputCode === currentCode);
                clearAllTimeouts();
                state = 'result';

                mouseConfirmBtn.classList.remove('correct', 'error');
                if (isCorrect) {
                    handleCorrectAnswer();
                } else {
                    handleWrongAnswer();
                }

                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    letterDisplay.classList.remove('correct', 'error');
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    clearScoreGlow();
                    setStatus('', '');
                    if (isCorrect) {
                        showNewLetter();
                        resetMouseInput();
                    } else {
                        resetAllDots();
                        updateTargetDots(currentCode);
                        resetMouseInput();
                        state = 'idle';
                        setStatus('', '');
                        updateInputDots();
                    }
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function isStreakMilestone(n) {
                if (n <= 0) return false;
                if (n <= 100) return n % 10 === 0;
                return n % 100 === 0;
            }

            function handleCorrectAnswer() {
                streak++;
                streakValue.textContent = streak;
                const milestone = isStreakMilestone(streak);

                if (milestone) {
                    streakBadge.classList.add('correct-streak');
                    streakValue.classList.add('glow-correct');
                    playStreak();
                } else {
                    streakBadge.classList.add('flash');
                    playCorrect();
                    setTimeout(() => streakBadge.classList.remove('flash'), RESULT_DISPLAY);
                }

                if (!hintVisible && streak > record) {
                    record = streak;
                    recordValue.textContent = record;
                    saveRecord();
                    if (milestone) {
                        recordBadge.classList.add('record-correct');
                        recordValue.classList.add('glow-correct');
                    }
                }

                letterDisplay.classList.add('correct');
                receiveLetterDisplay.classList.add('correct');
                mainCard.classList.add('correct-flash');
                mouseConfirmBtn.classList.add('correct');
                setStatus('✓ Верно!', 'success');
            }

            function handleWrongAnswer() {
                streak = 0;
                streakValue.textContent = '0';
                streakBadge.classList.add('error-streak');
                streakValue.classList.add('glow-error');
                playWrong();

                letterDisplay.classList.add('error');
                receiveLetterDisplay.classList.add('error');
                mainCard.classList.add('error-flash');
                mouseConfirmBtn.classList.add('error');
                setStatus('✗ Неверно. Попробуйте снова.', 'fail');
            }

            function clearScoreGlow() {
                streakBadge.classList.remove('correct-streak', 'error-streak', 'flash');
                streakValue.classList.remove('glow-correct', 'glow-error');
                recordBadge.classList.remove('record-correct');
                recordValue.classList.remove('glow-correct');
                receiveLetterDisplay.classList.remove('correct', 'error');
            }

            function updateSoundButton() {
                if (soundEnabled) {
                    menuSoundIcon.textContent = '𝆔';
                    menuSoundLabel.textContent = 'Звук Выкл.';
                } else {
                    menuSoundIcon.textContent = '𝆕';
                    menuSoundLabel.textContent = 'Звук Вкл.';
                }
            }

            function toggleSound() {
                soundEnabled = !soundEnabled;
                updateSoundButton();
                if (soundEnabled) {
                    playClickSafe();
                }
                menuDropdown.classList.remove('open');
            }

            function setModeUI() {
                const isSend = mode === 'send';
                const isReceive = mode === 'receive';

                // Управление классом send-mode на mainCard для поднятия буквы
                mainCard.classList.toggle('send-mode', isSend);

                radioSend.textContent = isSend ? '●' : '○';
                radioReceive.textContent = isReceive ? '●' : '○';
                radioSend.className = 'menu-item-radio' + (isSend ? ' active' : '');
                radioReceive.className = 'menu-item-radio' + (isReceive ? ' active' : '');

                modeItems.forEach(item => item.classList.remove('active'));
                if (isSend) document.querySelector('.mode-item[data-mode="send"]').classList.add('active');
                else if (isReceive) document.querySelector('.mode-item[data-mode="receive"]').classList.add('active');

                modeSendArea.style.display = (isSend || isReceive) ? '' : 'none';
                patternsSection.style.display = '';

                if (isSend) {
                    letterDisplay.style.display = '';
                    receiveArea.style.display = 'none';
                    hintWrapper.classList.toggle('hint-hidden', !hintVisible);

                    if (lastSendInputMode) {
                        activateMouseInput();
                    } else {
                        if (isMouseInput) deactivateMouseInput();
                        else updateKeyboardUI();
                    }
                    instructionsWrapper.classList.toggle('hint-hidden', !hintVisible || isMouseInput);
                    document.getElementById('hintRow').style.display = '';
                    document.getElementById('inputRow').style.display = '';
                    letterDisplay.classList.remove('reveal', 'correct', 'error');
                    receiveLetterDisplay.classList.remove('correct', 'error');
                    if (!currentLetter) showNewLetter();
                    else {
                        letterDisplay.textContent = currentLetter;
                        updateTargetDots(currentCode);
                    }
                } else {
                    letterDisplay.style.display = 'none';
                    receiveArea.style.display = 'flex';
                    instructionsWrapper.style.display = '';
                    if (hintVisible) {
                        instructionKeyboard.style.display = 'none';
                        decodingTableContainer.style.display = 'block';
                        alphabetButtons.style.display = 'none';
                        instructionsWrapper.classList.remove('hint-hidden');
                        buildDecodingTable();
                    } else {
                        instructionKeyboard.style.display = 'none';
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'flex';
                        instructionsWrapper.classList.remove('hint-hidden');
                        buildAlphabetButtons();
                    }
                    document.getElementById('hintRow').style.display = 'none';
                    document.getElementById('inputRow').style.display = 'none';
                    receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                    receiveLetterDisplay.style.color = 'transparent';
                    receiveLetterDisplay.style.transform = '';
                    receiveLetterDisplay.style.transition = '';
                    receiveLetterDisplay.textContent = '\u00A0';
                    mouseConfirmWrapper.style.display = 'none';
                    if (!currentLetter) showNewReceive();
                    else {
                        for (let i = 0; i < 5; i++) {
                            receiveDots[i].classList.remove('correct', 'error');
                            receiveDots[i].classList.toggle('lit', currentCode[i] === '1');
                        }
                        receiveLetterDisplay.textContent = '\u00A0';
                        receiveLetterDisplay.style.color = 'transparent';
                    }
                }
                menuHintToggle.style.display = '';
                updateHintWarning();
                if (statusText.textContent === '' || statusText.classList.contains('info')) {
                    setStatus('', '');
                }
                clearScoreGlow();
                updateSoundButton();
            }

            function applyHintVisibility() {
                hintWrapper.classList.toggle('hint-hidden', !hintVisible);

                const isReceive = mode === 'receive';
                const isSend = mode === 'send';

                if (isReceive) {
                    instructionsWrapper.classList.remove('hint-hidden');
                    instructionKeyboard.style.display = 'none';
                    mouseConfirmWrapper.style.display = 'none';
                    if (hintVisible) {
                        decodingTableContainer.style.display = 'block';
                        alphabetButtons.style.display = 'none';
                        buildDecodingTable();
                    } else {
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'flex';
                        buildAlphabetButtons();
                    }
                } else if (isSend) {
                    if (isMouseInput) {
                        instructionsWrapper.classList.add('hint-hidden');
                        instructionKeyboard.style.display = 'none';
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'none';
                        mouseConfirmWrapper.style.display = 'flex';
                    } else {
                        if (hintVisible) {
                            instructionsWrapper.classList.remove('hint-hidden');
                            instructionKeyboard.style.display = 'flex';
                            decodingTableContainer.style.display = 'none';
                            alphabetButtons.style.display = 'none';
                            mouseConfirmWrapper.style.display = 'none';
                        } else {
                            instructionsWrapper.classList.add('hint-hidden');
                            instructionKeyboard.style.display = 'none';
                            decodingTableContainer.style.display = 'none';
                            alphabetButtons.style.display = 'none';
                            mouseConfirmWrapper.style.display = 'none';
                        }
                    }
                }
                menuHintIcon.textContent = hintVisible ? '☑' : '☐';
                updateHintWarning();
                clearScoreGlow();
            }

            function toggleHint() {
                const wasHintVisible = hintVisible;
                hintVisible = !hintVisible;

                // Сброс счёта только при переходе из режима с подсказками в режим без подсказок
                if (!hintVisible) {
                    streak = 0;
                    streakValue.textContent = '0';
                    streakBadge.classList.remove('flash', 'correct-streak', 'error-streak');
                    streakValue.classList.remove('glow-correct', 'glow-error');
                    recordBadge.classList.remove('record-correct');
                    recordValue.classList.remove('glow-correct');
                    setStatus('Подсказки изменены — счёт сброшен', 'warning');
                    // Автоматически скрыть предупреждение через 5 секунд
                    if (statusTimeoutId) clearTimeout(statusTimeoutId);
                    statusTimeoutId = setTimeout(() => {
                        if (statusText.textContent === 'Подсказки изменены — счёт сброшен') {
                            setStatus('', '');
                        }
                        statusTimeoutId = null;
                    }, 5000);
                } else {
                    // При включении подсказок убираем любое предупреждение сразу
                    if (statusTimeoutId) {
                        clearTimeout(statusTimeoutId);
                        statusTimeoutId = null;
                    }
                    setStatus('', '');
                }

                playClickSafe();
                applyHintVisibility();
                menuDropdown.classList.remove('open');
                recordValue.textContent = record;
            }

            function saveRecord() {
                try { localStorage.setItem(STORAGE_KEY, record.toString()); } catch (e) {}
            }

            function loadRecord() {
                try {
                    const saved = parseInt(localStorage.getItem(STORAGE_KEY), 10);
                    record = isNaN(saved) ? 0 : saved;
                } catch (e) { record = 0; }
                recordValue.textContent = record;
            }

            function switchMode(newMode) {
                if (newMode === mode) {
                    menuDropdown.classList.remove('open');
                    return;
                }
                clearAllTimeouts();
                const wasMouseInput = isMouseInput;
                if (mode === 'send') {
                    lastSendInputMode = wasMouseInput;
                }
                pressedKeys.clear();
                receiveKeyIsDown = false;
                state = 'idle';
                resetAllDots();
                setStatus('', '');
                letterDisplay.classList.remove('correct', 'error', 'timer-active', 'reveal');
                receiveLetterDisplay.classList.remove('correct', 'error');
                mainCard.classList.remove('correct-flash', 'error-flash');
                receiveLetterDisplay.style.color = 'transparent';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';
                receiveLetterDisplay.textContent = '\u00A0';
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }

                if (isMouseInput && newMode !== 'send') {
                    isMouseInput = false;
                    updateKeyboardUI();
                    inputDotsContainer.classList.remove('mouse-active');
                    resetMouseInput();
                    pressedKeys.clear();
                    updateInputDots();
                    if (state === 'result') {
                        clearAllTimeouts();
                        state = 'idle';
                    }
                }

                mode = newMode;
                currentLetter = null;
                currentCode = null;
                setModeUI();
                streakValue.textContent = streak;
                recordValue.textContent = record;
                clearScoreGlow();
                if (mode === 'send') {
                    updateFingerLabels();
                    updateInstruction();
                    showNewLetter();
                } else if (mode === 'receive') {
                    if (hintVisible) buildDecodingTable();
                    else buildAlphabetButtons();
                    showNewReceive();
                }
                menuDropdown.classList.remove('open');
                playClickSafe();
            }

            function showNewLetter() {
                clearAllTimeouts();
                if (mode !== 'send') return;
                currentLetter = getRandomLetter();
                currentCode = letterCodes[currentLetter];
                letterDisplay.classList.remove('correct', 'error', 'timer-active');
                letterDisplay.textContent = currentLetter;
                letterDisplay.style.color = '';
                letterDisplay.style.transform = '';
                mainCard.classList.remove('correct-flash', 'error-flash');
                mouseConfirmBtn.classList.remove('correct', 'error');
                setStatus('', '');
                resetAllDots();
                updateFingerLabels();
                updateTargetDots(currentCode);
                if (!isMouseInput && pressedKeys.size > 0) {
                    state = 'idle';
                    releaseTimeoutId = setTimeout(() => {
                        if (pressedKeys.size > 0 && state === 'idle') {
                            state = 'waitRelease';
                            setStatus('Отпустите все клавиши...', 'warning');
                        }
                    }, RELEASE_DELAY);
                } else state = 'idle';
                updateInputDots();
                clearScoreGlow();
                receiveLetterDisplay.classList.remove('correct', 'error');
            }

            function getRandomLetter() {
                const pool = allLetters.filter(l => l !== currentLetter);
                return pool[Math.floor(Math.random() * pool.length)];
            }

            function getCurrentInputCode() {
                const bits = [0, 0, 0, 0, 0];
                const map = activeHand === 'right' ? keyToBitRight : keyToBitLeft;
                for (const c of pressedKeys) {
                    if (map.hasOwnProperty(c)) bits[map[c]] = 1;
                }
                return bits.join('');
            }

            function updateInputDots() {
                const code = isMouseInput ? mouseInputBits.join('') : getCurrentInputCode();
                getInputDots().forEach(d => {
                    const f = parseInt(d.getAttribute('data-finger'), 10);
                    if (code[f] === '1') {
                        if (!d.classList.contains('pressed')) {
                            d.classList.add('pressed');
                            d.style.animation = 'none';
                            d.offsetHeight;
                            d.style.animation = 'dotPress 0.2s ease-out';
                        }
                    } else {
                        d.classList.remove('pressed');
                        d.style.animation = '';
                    }
                });
            }

            function updateTargetDots(code) {
                getTargetDots().forEach(d => {
                    const f = parseInt(d.getAttribute('data-finger'), 10);
                    d.classList.toggle('active', code[f] === '1');
                });
            }

            function resetAllDots() {
                [...getTargetDots(), ...getInputDots()].forEach(d => {
                    d.classList.remove('pressed', 'active');
                    d.style.animation = '';
                });
            }

            function clearAllTimeouts() {
                if (evaluationTimeoutId) clearTimeout(evaluationTimeoutId);
                if (resultTimeoutId) clearTimeout(resultTimeoutId);
                if (releaseTimeoutId) clearTimeout(releaseTimeoutId);
                if (revealTimeoutId) clearTimeout(revealTimeoutId);
                if (statusTimeoutId) clearTimeout(statusTimeoutId);
                evaluationTimeoutId = resultTimeoutId = releaseTimeoutId = revealTimeoutId = statusTimeoutId = null;
                receiveKeyIsDown = false;
            }

            function setStatus(t, type) {
                statusText.textContent = t;
                statusText.className = 'status-text';
                if (type) statusText.classList.add(type);
            }

            function startTimer() {
                if (isMouseInput || state !== 'idle' || pressedKeys.size === 0) return;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                state = 'counting';
                clearAllTimeouts();
                letterDisplay.classList.remove('correct', 'error');
                letterDisplay.style.color = '';
                letterDisplay.style.transform = '';
                mainCard.classList.remove('correct-flash', 'error-flash');
                setStatus('Приготовьтесь', 'warning');
                letterDisplay.classList.add('timer-active');
                evaluationTimeoutId = setTimeout(() => evaluateSend(), TIMER_DURATION);
            }

            function evaluateSend() {
                const inputCode = getCurrentInputCode();
                const isCorrect = (inputCode === currentCode);
                letterDisplay.classList.remove('timer-active');
                if (evaluationTimeoutId) clearTimeout(evaluationTimeoutId);
                evaluationTimeoutId = null;
                state = 'result';
                if (isCorrect) {
                    handleCorrectAnswer();
                } else {
                    handleWrongAnswer();
                }
                updateInputDots();
                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    letterDisplay.classList.remove('correct', 'error', 'timer-active');
                    letterDisplay.style.color = '';
                    letterDisplay.style.transform = '';
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    clearScoreGlow();
                    setStatus('', '');
                    if (isCorrect) {
                        showNewLetter();
                    } else {
                        letterDisplay.classList.remove('correct', 'error', 'timer-active');
                        letterDisplay.style.color = '';
                        letterDisplay.style.transform = '';
                        mainCard.classList.remove('correct-flash', 'error-flash');
                        setStatus('', '');
                        resetAllDots();
                        updateTargetDots(currentCode);
                        if (pressedKeys.size > 0) {
                            state = 'idle';
                            releaseTimeoutId = setTimeout(() => {
                                if (pressedKeys.size > 0 && state === 'idle') {
                                    state = 'waitRelease';
                                    setStatus('Отпустите все клавиши...', 'warning');
                                }
                            }, RELEASE_DELAY);
                        } else {
                            state = 'idle';
                        }
                        updateInputDots();
                    }
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function startReceiveChar(char, isMouse) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown) return;
                if (!letterCodes[char]) return;

                receiveKeyIsDown = true;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }

                receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                receiveLetterDisplay.textContent = char;
                receiveLetterDisplay.style.color = '';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';

                requestAnimationFrame(() => {
                    evaluateReceiveChar(char, isMouse);
                });
            }

            function evaluateReceiveChar(pressedChar, isMouse) {
                const isCorrect = pressedChar === currentLetter;
                state = 'result';
                receiveLetterDisplay.classList.remove('reveal', 'timer-active');
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';

                if (isCorrect) {
                    handleCorrectAnswer();
                    for (let d of receiveDots) {
                        if (d.classList.contains('lit')) {
                            d.classList.remove('lit');
                            d.classList.add('correct');
                        }
                    }
                } else {
                    handleWrongAnswer();
                    for (let d of receiveDots) {
                        if (d.classList.contains('lit')) {
                            d.classList.remove('lit');
                            d.classList.add('error');
                        }
                    }
                }

                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    setStatus('', '');
                    clearScoreGlow();
                    if (isCorrect) {
                        showNewReceive();
                    } else {
                        retrySameLetter();
                    }
                    receiveKeyIsDown = false;
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function handleReceiveKey(e) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown || e.repeat) return;
                const allowedChars = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
                let char = null;
                if (e.key && e.key.length === 1 && allowedChars.includes(e.key.toUpperCase())) {
                    char = e.key.toUpperCase();
                } else if (codeToRussianMap[e.code]) {
                    char = codeToRussianMap[e.code];
                }
                if (!char) return;
                e.preventDefault();
                startReceiveChar(char, false);
            }

            function handleMouseReceive(char) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown) return;
                if (!letterCodes[char]) return;
                startReceiveChar(char, true);
            }

            function showNewReceive() {
                clearAllTimeouts();
                if (mode !== 'receive') return;
                currentLetter = getRandomLetter();
                currentCode = letterCodes[currentLetter];
                for (let i = 0; i < 5; i++) {
                    receiveDots[i].classList.remove('correct', 'error');
                    receiveDots[i].classList.toggle('lit', currentCode[i] === '1');
                }
                receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                receiveLetterDisplay.style.color = 'transparent';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';
                receiveLetterDisplay.textContent = '\u00A0';
                state = 'idle';
                setStatus('', '');
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                receiveKeyIsDown = false;
                clearScoreGlow();
            }

            function retrySameLetter() {
                clearAllTimeouts();
                for (let i = 0; i < 5; i++) {
                    receiveDots[i].classList.remove('correct', 'error');
                    receiveDots[i].classList.toggle('lit', currentCode[i] === '1');
                }
                receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                receiveLetterDisplay.style.color = 'transparent';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';
                receiveLetterDisplay.textContent = '\u00A0';
                state = 'idle';
                setStatus('', '');
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                receiveKeyIsDown = false;
                clearScoreGlow();
            }

            function handleKeyDown(e) {
                if (isMouseInput) {
                    e.preventDefault();
                    deactivateMouseInput();
                }
                if (mode === 'receive') {
                    handleReceiveKey(e);
                    return;
                }
                if (!allRelevantCodes.has(e.code)) return;
                e.preventDefault();

                const wasEmpty = pressedKeys.size === 0;

                if (rightOnly.has(e.code)) {
                    if (activeHand !== 'right') {
                        activeHand = 'right';
                        updateFingerLabels();
                        updateInstruction();
                        if (currentCode) updateTargetDots(currentCode);
                    }
                } else if (leftOnly.has(e.code)) {
                    if (activeHand !== 'left') {
                        activeHand = 'left';
                        updateFingerLabels();
                        updateInstruction();
                        if (currentCode) updateTargetDots(currentCode);
                    }
                }
                if (state === 'waitRelease' || state === 'result') {
                    pressedKeys.add(e.code);
                    updateInputDots();
                    return;
                }

                pressedKeys.add(e.code);
                updateInputDots();

                if (wasEmpty && mode === 'send' && !isMouseInput && state === 'idle') {
                    playClickSafe();
                }

                if (state === 'idle' && wasEmpty) {
                    startTimer();
                }
            }

            function handleKeyUp(e) {
                if (mode === 'receive') {
                    receiveKeyIsDown = false;
                    if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                    if (state === 'waitRelease') {
                        state = 'idle';
                        setStatus('', '');
                    }
                    return;
                }
                if (!allRelevantCodes.has(e.code)) return;
                e.preventDefault();
                pressedKeys.delete(e.code);
                updateInputDots();
                if (state === 'counting' && pressedKeys.size === 0) {
                    clearTimeout(evaluationTimeoutId);
                    evaluationTimeoutId = null;
                    letterDisplay.classList.remove('timer-active');
                    letterDisplay.style.color = '';
                    letterDisplay.style.transform = '';
                    setStatus('', '');
                    state = 'idle';
                }
                if (state === 'idle' && pressedKeys.size === 0 && releaseTimeoutId) {
                    clearTimeout(releaseTimeoutId);
                    releaseTimeoutId = null;
                    setStatus('', '');
                }
                if (state === 'waitRelease' && pressedKeys.size === 0) {
                    state = 'idle';
                    setStatus('', '');
                }
            }

            function handleBlur() {
                if (pressedKeys.size > 0) {
                    pressedKeys.clear();
                    updateInputDots();
                }
                receiveKeyIsDown = false;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                if (evaluationTimeoutId) { clearTimeout(evaluationTimeoutId); evaluationTimeoutId = null; }
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                if (state === 'counting' || state === 'reveal') {
                    state = 'idle';
                    letterDisplay.classList.remove('timer-active');
                    letterDisplay.style.color = '';
                    letterDisplay.style.transform = '';
                    receiveLetterDisplay.textContent = '\u00A0';
                    receiveLetterDisplay.classList.remove('reveal', 'timer-active');
                    receiveLetterDisplay.style.color = 'transparent';
                    receiveLetterDisplay.style.transform = '';
                    receiveLetterDisplay.style.transition = '';
                }
                if (state === 'waitRelease') {
                    state = 'idle';
                    setStatus('', '');
                }
            }

            // ======================== Обработчики событий ========================

            menuBtn.addEventListener('click', e => {
                e.stopPropagation();
                menuDropdown.classList.toggle('open');
                playClickSafe();
            });

            modeItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    const newMode = this.dataset.mode;
                    if (newMode) switchMode(newMode);
                    playClickSafe();
                });
            });

            menuHintToggle.addEventListener('click', toggleHint);
            menuInfo.addEventListener('click', () => {
                window.open(
                    'https://drive.google.com/drive/folders/1ifBkgXc-yeQVHzGPw9zmMTHdrrNAgOrH?usp=sharing',
                    '_blank');
                menuDropdown.classList.remove('open');
                playClickSafe();
            });

            menuSoundToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSound();
            });

            document.addEventListener('click', e => {
                if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                    menuDropdown.classList.remove('open');
                }
            });

            document.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                if (mode !== 'send') return;
                if (isMouseInput) return;
                if (e.target.closest('.header-right')) return;
                if (e.target.closest('.menu-dropdown')) return;
                activateMouseInput();
            });

            // Обработчик кликов по точкам ввода (мышь)
            inputDotsContainer.addEventListener('click', function(e) {
                if (!isMouseInput) return;
                // Если уже было обработано касанием, пропускаем
                if (touchHandled) {
                    touchHandled = false;
                    return;
                }
                const dot = e.target.closest('.input-dot');
                if (!dot) return;
                e.preventDefault();
                e.stopPropagation();
                const finger = parseInt(dot.getAttribute('data-finger'), 10);
                mouseInputBits[finger] = mouseInputBits[finger] ? 0 : 1;
                updateMouseDots();
                playClickSafe();
            });

            // Обработчик касаний для мобильных устройств (мгновенная реакция)
            if (isTouchDevice) {
                inputDotsContainer.addEventListener('touchstart', function(e) {
                    if (!isMouseInput) return;
                    const dot = e.target.closest('.input-dot');
                    if (!dot) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const finger = parseInt(dot.getAttribute('data-finger'), 10);
                    mouseInputBits[finger] = mouseInputBits[finger] ? 0 : 1;
                    updateMouseDots();
                    playClickSafe();
                    // Устанавливаем флаг, чтобы предотвратить повторную обработку в click
                    touchHandled = true;
                    // Сбрасываем флаг асинхронно, чтобы click успел его увидеть
                    setTimeout(() => { touchHandled = false; }, 0);
                }, { passive: false });
            }

            mouseConfirmBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleMouseConfirm();
            });

            mouseResetBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (!isMouseInput) return;
                resetMouseInput();
                if (state === 'result') {
                    clearAllTimeouts();
                    state = 'idle';
                    setStatus('', '');
                    letterDisplay.classList.remove('correct', 'error');
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    resetAllDots();
                    updateTargetDots(currentCode);
                    updateInputDots();
                    clearScoreGlow();
                }
                playClickSafe();
            });

            decodingTableWrap.addEventListener('click', function(e) {
                const td = e.target.closest('td[data-letter]');
                if (!td) return;
                if (e.target.closest('.sort-btn')) return;
                const letter = td.dataset.letter;
                if (mode === 'receive' && state === 'idle' && !receiveKeyIsDown) {
                    handleMouseReceive(letter);
                }
            });

            // ======================== Инициализация ========================

            function init() {
                loadRecord();
                document.addEventListener('keydown', handleKeyDown);
                document.addEventListener('keyup', handleKeyUp);
                window.addEventListener('blur', handleBlur);
                mode = 'send';
                setModeUI();
                updateFingerLabels();
                updateInstruction();
                showNewLetter();
                if (isTouchDevice && lastSendInputMode) {
                    activateMouseInput();
                }
                streakValue.textContent = '0';
                recordValue.textContent = record;
                buildDecodingTable();
                buildAlphabetButtons();
                radioSend.textContent = '●';
                radioReceive.textContent = '○';
                radioSend.className = 'menu-item-radio active';
                radioReceive.className = 'menu-item-radio';
                patternsSection.style.display = '';
                updateSoundButton();
            }
            init();
        })();
    </script>
</body>
</html>
