<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Тренажёр MKC</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖐️</text></svg>" />

    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #1a1a2e;
            --surface-light: #22223a;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #5b8def;
            --accent-glow: #7aa4ff;
            --success: #4caf84;
            --success-glow: #6fe0a8;
            --error: #e0556a;
            --error-glow: #ff7b8a;
            --gold: #f0c060;
            --gold-glow: #ffd780;
            --finger-up: #2a2a44;
            --finger-up-border: #4a4a68;
            --finger-down: #5b8def;
            --finger-down-glow: #8ab4ff;
            --finger-target: #3a3a58;
            --finger-target-active: #5b8def33;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
            --result-duration: 0.6s;
            --dot-size: 40px;
            --dot-gap: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 50% 30%, #1a1a40 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, #0d0d22 0%, transparent 60%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 620px;
            padding: 24px 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* --- режим чата на мобильных (исправлено) --- */
        .container.chat-layout {
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
            min-height: auto;
            padding: 0;
            max-width: 100%;
        }
        .container.chat-layout .header {
            padding: 24px 24px 0;
            margin-bottom: 20px;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .content-area.chat-layout {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0;
        }
        .chat-layout #chatTouchGrid {
            flex: 1;
            height: auto;
            width: 100%;
            flex-shrink: 0;
        }
        /* --------------------------------- */
        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding-bottom: 24px;
        }
        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--text);
            line-height: 1.3;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            flex-wrap: wrap;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 30px;
            padding: 10px 18px;
            transition: border-color 0s, box-shadow 0s;
        }
        .badge-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            min-width: 30px;
            text-align: center;
            transition: color 0s;
        }

        /* ======== ИСПРАВЛЕНИЕ: ЦЕНТРИРОВАНИЕ ЭМОДЗИ В БЕЙДЖАХ ======== */
        .badge-icon {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .chat-controls {
            display: none;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .chat-controls.show {
            display: none;
        }
        .chat-controls .chat-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid #333355;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .chat-controls .chat-icon-btn:hover {
            background: #2a2a48;
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .chat-controls .chat-peer-input {
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 20px;
            padding: 6px 12px;
            color: var(--text);
            width: 120px;
            text-align: center;
            font-family: var(--font);
            font-size: 0.8rem;
        }
        .chat-controls .peer-id-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .chat-controls .peer-id-value {
            font-weight: bold;
            color: var(--accent-glow);
            font-size: 0.85rem;
            user-select: all;
        }

        .chat-control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 30px;
            padding: 4px 12px 4px 16px;
        }
        .chat-control-group .chat-icon-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 0;
        }
        .chat-control-group .chat-icon-btn:hover {
            color: #fff;
            background: transparent;
            box-shadow: none;
        }
        .chat-control-group .peer-id-value {
            font-size: 0.8rem;
        }
        .chat-control-group .chat-peer-input {
            width: 100px;
            padding: 4px 8px;
            font-size: 0.75rem;
            background: transparent;
            border: 1px solid #333355;
            border-radius: 16px;
            color: var(--text);
            text-align: center;
        }
        .chat-control-group .chat-peer-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        @keyframes glowCorrect {
            0% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
            10% {
                color: var(--success);
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            25% {
                transform: scale(1.08);
            }
            55% {
                transform: scale(1.03);
            }
            90% {
                color: var(--success);
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            100% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
        }
        @keyframes glowError {
            0% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: translateX(0);
            }
            10% {
                color: var(--error);
                border-color: var(--error);
                box-shadow: 0 0 20px rgba(224, 85, 106, 0.5);
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(3px);
            }
            90% {
                color: var(--error);
                border-color: var(--error);
                box-shadow: 0 0 20px rgba(224, 85, 106, 0.5);
                transform: translateX(0);
            }
            100% {
                color: var(--gold);
                border-color: #333355;
                box-shadow: none;
                transform: translateX(0);
            }
        }

        @keyframes glowRecordCorrectMove {
            0% {
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
            10% {
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            25% {
                transform: scale(1.08);
            }
            55% {
                transform: scale(1.03);
            }
            90% {
                border-color: var(--success);
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.5);
                transform: scale(1);
            }
            100% {
                border-color: #333355;
                box-shadow: none;
                transform: scale(1);
            }
        }
        @keyframes glowCorrectValue {
            0% {
                color: var(--gold);
            }
            10% {
                color: var(--success);
            }
            90% {
                color: var(--success);
            }
            100% {
                color: var(--gold);
            }
        }
        @keyframes glowErrorValue {
            0% {
                color: var(--gold);
            }
            10% {
                color: var(--error);
            }
            90% {
                color: var(--error);
            }
            100% {
                color: var(--gold);
            }
        }
        @keyframes streakPulse {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.08);
            }
            60% {
                transform: scale(1.03);
            }
        }

        .streak-badge.correct-streak {
            animation: glowCorrect var(--result-duration) ease forwards;
        }
        .streak-badge.error-streak {
            animation: glowError var(--result-duration) ease forwards;
        }
        .streak-badge.flash {
            animation: streakPulse var(--result-duration) ease-out;
        }
        .record-badge.record-correct {
            animation: glowRecordCorrectMove var(--result-duration) ease forwards;
        }
        .badge-value.glow-correct {
            animation: glowCorrectValue var(--result-duration) ease forwards;
        }
        .badge-value.glow-error {
            animation: glowErrorValue var(--result-duration) ease forwards;
        }

        .hint-badge {
            width: fit-content;
            max-width: 100%;
            flex-shrink: 1;
            min-width: 0;
        }
        .hint-badge .badge-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: auto;
            text-align: left;
            white-space: normal;
            line-height: 1.3;
            max-width: 160px;
        }
        .menu-btn {
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.5rem;
            transition: all var(--transition);
            padding: 0;
            line-height: 1;
            position: relative;
            flex-shrink: 0;
        }
        .menu-btn-alt {
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.5rem;
            transition: all var(--transition);
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .menu-btn:hover,
        .menu-btn-alt:hover {
            background: #2a2a48;
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .menu-dropdown {
            position: absolute;
            top: calc(100% + 8px) !important;
            right: 0 !important;
            background: var(--surface);
            border: 1px solid #333355;
            border-radius: var(--radius-sm);
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            min-width: 210px;
            width: max-content;
            max-width: 90vw;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
        }
        .menu-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
            pointer-events: auto;
        }
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 2px;
        }
        .menu-section-header {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 10px 4px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
            user-select: none;
        }
        .menu-section-header .section-arrow {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .menu-divider {
            height: 1px;
            background: #2a2a48;
            margin: 6px 6px;
        }
        .menu-item {
            background: transparent;
            border: 2px solid transparent;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            width: 100%;
            text-align: left;
            font-family: var(--font);
        }
        .menu-item:hover {
            background: #2a2a48;
            border-color: transparent;
        }
        .menu-item.active {
            background: #2a2a40;
            border-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(91, 141, 239, 0.3);
        }
        .menu-item-radio {
            font-size: 0.9rem;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
            color: var(--text-secondary);
            transition: color var(--transition);
        }
        .menu-item-radio.active {
            color: var(--accent-glow);
        }
        .menu-item-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .menu-item-label {
            flex: 1;
        }

        #menuConnectionSection .menu-item {
            pointer-events: auto;
            background: transparent;
            border: none;
            padding: 4px 10px;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        #menuConnectionSection .menu-item button {
            pointer-events: auto;
        }
        #menuConnectionSection .chat-peer-input {
            width: 80px;
            font-size: 0.75rem;
            padding: 4px 8px;
            background: #1e1e36;
            border: 1px solid #333355;
            border-radius: 14px;
            color: var(--text);
            text-align: center;
        }
        #menuConnectionSection .chat-icon-btn {
            width: 30px;
            height: 30px;
            font-size: 1rem;
            background: #2a2a44;
            border: 1px solid #333355;
            border-radius: 50%;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
        }
        #menuConnectionSection .chat-icon-btn:hover {
            background: #3a4a70;
            border-color: var(--accent);
            color: #fff;
        }
        #menuConnectionSection .peer-id-value {
            font-weight: bold;
            color: var(--accent-glow);
            font-size: 0.8rem;
            user-select: all;
        }

        @keyframes mainCardCorrect {
            0% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            10% {
                border-color: var(--success);
                box-shadow: 0 0 60px rgba(76, 175, 132, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            90% {
                border-color: var(--success);
                box-shadow: 0 0 60px rgba(76, 175, 132, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            100% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
        }
        @keyframes mainCardError {
            0% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            10% {
                border-color: var(--error);
                box-shadow: 0 0 60px rgba(224, 85, 106, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            90% {
                border-color: var(--error);
                box-shadow: 0 0 60px rgba(224, 85, 106, 0.25), 0 8px 40px rgba(0, 0, 0, 0.3);
            }
            100% {
                border-color: #2a2a48;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            }
        }
        .main-card {
            background: var(--surface);
            border: 1px solid #2a2a48;
            border-radius: var(--radius);
            padding: 32px 28px 24px;
            text-align: center;
            position: relative;
            transition: border-color 0s, box-shadow 0s;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
        }
        .main-card.correct-flash {
            animation: mainCardCorrect var(--result-duration) ease forwards;
        }
        .main-card.error-flash {
            animation: mainCardError var(--result-duration) ease forwards;
        }

        .letter-display {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
            transition: color 0.25s ease, transform 0.3s ease;
            color: var(--text);
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform, color;
            margin-bottom: 16px;
            position: relative;
        }
        .letter-inner {
            display: inline-block;
        }
        .letter-inner.correct {
            color: var(--success);
            animation: letterPop 0.4s ease-out;
        }
        .letter-inner.error {
            color: var(--error);
            animation: letterShake 0.4s ease-out;
        }
        .letter-inner.timer-active {
            color: #f0c060;
            transform: scale(1.12);
            transition: color 0.8s linear, transform 0.8s ease-out;
        }
        .letter-inner.reveal {
            color: #ffffff;
        }
        @keyframes letterPop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.15);
            }
            60% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes letterShake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        .letter-display .lang-flag {
            position: absolute;
            top: 50%;
            right: -5px;
            transform: translateY(-50%);
            font-size: 1.6rem;
            line-height: 1;
        }

        .lang-flag-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            line-height: 1;
            pointer-events: none;
            display: none;
            z-index: 2;
            transition: none !important;
        }

        .main-card.send-mode .letter-display {
            position: relative;
            top: -6px;
        }

        .status-text {
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 24px;
            letter-spacing: 0.05em;
            color: var(--text);
            transition: none;
            position: relative;
        }
        .status-text.success {
            color: var(--success);
        }
        .status-text.fail {
            color: var(--error);
        }
        .status-text.warning {
            color: var(--gold);
        }
        .status-text.info {
            color: var(--text-secondary);
        }

        @keyframes fadeInWarning {
            0% { opacity: 0; transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .status-text.warning.animate-warning {
            animation: fadeInWarning 0.4s ease-out;
        }

        .patterns-section {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        .pattern-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }
        .pattern-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 90px;
            text-align: right;
            flex-shrink: 0;
        }
        .pattern-row.full-mode .pattern-label {
            display: none;
        }
        .pattern-row.full-mode .hint-placeholder {
            display: none;
        }
        .finger-dots {
            display: flex;
            gap: var(--dot-gap);
            justify-content: center;
            align-items: center;
        }
        .finger-dot {
            width: var(--dot-size);
            height: var(--dot-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .target-dot {
            background: var(--finger-target);
            border: 2px solid #3a3a5c;
            color: #7777a0;
        }
        .target-dot.active {
            background: #3a4a70;
            border-color: #5b8def88;

        .container.chat-mode .send-circle,

    <script>
        (function() {
            // ======================== SFX ========================
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;
            let soundEnabled = true;

            let lastClickTime = 0;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            function _playClick() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05);
                } catch (_) {}
            }

            function playClickSafe() {
                const now = performance.now();
                if (now - lastClickTime < 50) return;
                lastClickTime = now;
                _playClick();
            }

            function playCorrect() {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    const osc1 = ctx.createOscillator();
                    const g1 = ctx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                    g1.gain.setValueAtTime(0.25, ctx.currentTime);
                    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.10);
                    osc1.connect(g1);
                    g1.connect(ctx.destination);
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.10);

                    setTimeout(() => {
                        if (!soundEnabled) return;
                        try {
                            const osc2 = ctx.createOscillator();
                            const g2 = ctx.createGain();
                            osc2.type = 'sine';
                            osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
                            g2.gain.setValueAtTime(0.22, ctx.currentTime);
                            g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                            osc2.connect(g2);
                            g2.connect(ctx.destination);
                            osc2.start(ctx.currentTime);
                            osc2.stop(ctx.currentTime + 0.12);
                        } catch (_) {}
                    }, 80);
                } catch (_) {}
            }

            function playWrong() {
                if (!soundEnabled) return;

                    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc1.connect(g1);
                    g1.connect(ctx.destination);
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.12);

                            const osc2 = ctx.createOscillator();

                            g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                            osc2.connect(g2);
                            g2.connect(ctx.destination);
                            osc2.start(ctx.currentTime);
                            osc2.stop(ctx.currentTime + 0.15);
                        } catch (_) {}
                    }, 100);
                } catch (_) {}
            }

            function playStreak() {
                if (!soundEnabled) return;

            function buildDecodingTable() {
                const wrap = decodingTableWrap;
                wrap.innerHTML = '';

                let topLetters, bottomLetters;
                if (isSorted) {
                    const realLetters = allLetters.slice().sort((a, b) => {
                        if (language === 'ru') return a.localeCompare(b, 'ru');
                        return a.localeCompare(b, 'en');
                    });
                    const topCount = 15;
                    const bottomCount = 16;
                    topLetters = realLetters.slice(0, topCount);
                    bottomLetters = realLetters.slice(topCount, topCount + bottomCount);
                    while (topLetters.length < topCount) topLetters.push(' ');
                    while (bottomLetters.length < bottomCount) bottomLetters.push(' ');
                } else {
                    topLetters = defaultTop.slice();
                    bottomLetters = defaultBottom.slice();
                }

                function getCodesForLetters(letters) {
                    const codes = { 'Бп': [], 'У': [], 'С': [], 'Б': [], 'М': [] };
                    for (let letter of letters) {
                        if (letter === ' ') {
                            codes['Бп'].push(0);
                            codes['У'].push(0);
                            codes['С'].push(0);
                            codes['Б'].push(0);
                            codes['М'].push(0);
                            continue;
                        }
                        const code = letterCodes[letter];
                        if (!code) {
                            codes['Бп'].push(0);
                            codes['У'].push(0);
                            codes['С'].push(0);
                            codes['Б'].push(0);
                            codes['М'].push(0);
                            continue;
                        }
                        const bits = code.split('').map(Number);
                        codes['Бп'].push(bits[0]);
                        codes['У'].push(bits[1]);
                        codes['С'].push(bits[2]);
                        codes['Б'].push(bits[3]);
                        codes['М'].push(bits[4]);
                    }
                    return codes;
                }

                function createBlock(letters, isTop) {
                    const block = document.createElement('div');
                    block.className = 'decoding-block';
                    const table = document.createElement('table');
                    table.className = 'decoding-table';
                    const codes = getCodesForLetters(letters);
                    const colCount = letters.length;

                    for (let row = 0; row < 5; row++) {
                        const tr = document.createElement('tr');
                        const finger = fingerNames[row];
                        if (isTop) {
                            const th = document.createElement('th');
                            th.className = 'finger-label';
                            th.textContent = finger;
                            tr.appendChild(th);
                        }
                        const rowCodes = codes[finger];
                        for (let col = 0; col < colCount; col++) {
                            const td = document.createElement('td');
                            td.className = 'dot-cell';
                            if (letters[col] === ' ') {
                                td.classList.add('empty-cell');
                                td.dataset.letter = ' ';
                            } else {
                                td.dataset.letter = letters[col];
                            }
                            const dot = document.createElement('div');
                            dot.className = 'decoding-dot' + (rowCodes[col] === 1 ? ' filled' : ' empty');
                            td.appendChild(dot);
                            tr.appendChild(td);
                        }
                        table.appendChild(tr);
                    }

                    const trLetters = document.createElement('tr');
                    if (isTop) {
                        const thSort = document.createElement('th');
                        thSort.className = 'sort-cell' + (isSorted ? ' active' : '');
                        const btn = document.createElement('button');
                        btn.className = 'sort-btn';
                        btn.textContent = '⇄';
                        btn.title = 'Переключить порядок букв';
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            isSorted = !isSorted;
                            buildDecodingTable();
                        });
                        thSort.appendChild(btn);
                        trLetters.appendChild(thSort);
                    }
                    for (let col = 0; col < colCount; col++) {
                        const td = document.createElement('td');
                        td.className = 'letter-cell';
                        if (letters[col] === ' ') {
                            td.classList.add('empty-cell');
                            td.dataset.letter = ' ';
                            td.textContent = ' ';
                        } else {
                            td.dataset.letter = letters[col];
                            td.textContent = letters[col];
                        }
                        trLetters.appendChild(td);
                    }
                    table.appendChild(trLetters);
                    block.appendChild(table);
                    return block;
                }

                wrap.appendChild(createBlock(topLetters, true));
                wrap.appendChild(createBlock(bottomLetters, false));
            }

            function buildAlphabetButtons() {
                alphabetGrid.innerHTML = '';
                const sorted = allLetters.slice().sort((a, b) => {
                    if (language === 'ru') return a.localeCompare(b, 'ru');
                    return a.localeCompare(b, 'en');
                });
                for (let letter of sorted) {
                    const btn = document.createElement('button');
                    btn.className = 'alphabet-btn';
                    btn.textContent = letter;
                    btn.dataset.letter = letter;
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleMouseReceive(letter);
                    });
                    alphabetGrid.appendChild(btn);
                }
            }

            function updateInputDots() {
                const dots = getInputDots();
                const bits = isMouseInput ? mouseInputBits : getCurrentInputCodeBits();
                for (let i = 0; i < 5; i++) {
                    if (i < dots.length) {
                        dots[i].classList.toggle('pressed', bits[i] === 1);
                    }
                }
                if (mode === 'full' && dots.length > 5) {
                    const dirDots = dots.slice(5);
                    dirDots.forEach(d => d.classList.remove('direction-pressed'));
                    const dirs = isMouseInput ? mouseDirections : getCurrentInputDirections();
                    const shift = getDirectionShift();
                    const leftDot = dirDots.find(d => d.dataset.dir === '<');
                    const rightDot = dirDots.find(d => d.dataset.dir === '>');
                    if (leftDot && rightDot) {
                        if (dirs.length > 0 && dirs[0] === '>') {
                            leftDot.style.transform = `translateX(${shift}px)`;
                            rightDot.style.transform = `translateX(-${shift}px)`;
                        } else {
                            leftDot.style.transform = 'translateX(0)';
                            rightDot.style.transform = 'translateX(0)';
                        }
                    }
                    for (let i = 0; i < dirs.length && i < 2; i++) {
                        const ch = dirs[i];
                        const dot = dirDots.find(d => d.dataset.dir === ch);
                        if (dot) dot.classList.add('direction-pressed');
                    }
                }
            }

            function getDirectionShift() {
                const dots = getInputDots();
                const dirDots = dots.slice(5);
                if (dirDots.length < 2) return 50;
                const first = dirDots[0];
                const style = getComputedStyle(first);
                const width = parseFloat(style.width) || 40;
                const parent = first.parentElement;
                const parentStyle = getComputedStyle(parent);
                const gap = parseFloat(parentStyle.gap) || 10;
                return width + gap;
            }

            function getCurrentInputCodeBits() {
                const bits = [0,0,0,0,0];
                for (const c of pressedKeys) {
                    if (keyToBitRight.hasOwnProperty(c)) bits[keyToBitRight[c]] = 1;
                    if (keyToBitLeft.hasOwnProperty(c)) bits[keyToBitLeft[c]] = 1;
                }
                return bits;
            }

            function getCurrentInputDirections() {
                return [];
            }

            function resetMouseInput() {
                mouseInputBits = [0,0,0,0,0];
                mouseDirections = [];

            function updateTargetDots(code, directions) {
                const dots = getTargetDots();
                for (let i = 0; i < 5; i++) {
                    if (i < dots.length) {
                        dots[i].classList.toggle('active', code[i] === '1');
                    }
                }
                if (mode === 'full' && dots.length > 5) {
                    const dirDots = dots.slice(5);
                    dirDots.forEach(d => d.classList.remove('direction-active'));
                    if (directions) {
                        const dirs = directions.split('');
                        const shift = getDirectionShift();
                        const leftDot = dirDots.find(d => d.dataset.dir === '<');
                        const rightDot = dirDots.find(d => d.dataset.dir === '>');
                        if (leftDot && rightDot) {
                            if (dirs.length > 0 && dirs[0] === '>') {
                                leftDot.style.transform = `translateX(${shift}px)`;
                                rightDot.style.transform = `translateX(-${shift}px)`;
                            } else {
                                leftDot.style.transform = 'translateX(0)';
                                rightDot.style.transform = 'translateX(0)';
                            }
                        }
                        for (let i = 0; i < dirs.length && i < 2; i++) {
                            const ch = dirs[i];
                            const dot = dirDots.find(d => d.dataset.dir === ch);
                            if (dot) dot.classList.add('direction-active');
                        }
                    } else {
                        const leftDot = dirDots.find(d => d.dataset.dir === '<');
                        const rightDot = dirDots.find(d => d.dataset.dir === '>');
                        if (leftDot && rightDot) {
                            leftDot.style.transform = 'translateX(0)';
                            rightDot.style.transform = 'translateX(0)';
                        }
                    }
                }
            }

            function resetAllDots() {
                [...getTargetDots(), ...getInputDots()].forEach(d => {
                    d.classList.remove('pressed', 'active', 'direction-active', 'direction-pressed', 'animate-press');
                    d.style.animation = '';
                    d.style.transform = 'translateX(0)';
                });
                document.querySelectorAll('.input-dot.direction-dot, .target-dot.direction-dot').forEach(d => {
                    d.style.transform = 'translateX(0)';
                });
            }

            function clearAllTimeouts() {
                if (evaluationTimeoutId) clearTimeout(evaluationTimeoutId);
                if (resultTimeoutId) clearTimeout(resultTimeoutId);
                if (releaseTimeoutId) clearTimeout(releaseTimeoutId);
                if (revealTimeoutId) clearTimeout(revealTimeoutId);
                if (statusTimeoutId) clearTimeout(statusTimeoutId);
                evaluationTimeoutId = resultTimeoutId = releaseTimeoutId = revealTimeoutId = statusTimeoutId = null;
                receiveKeyIsDown = false;
            }

            function setStatus(t, type) {
                currentStatusMessage = t;
                const flagEl = document.getElementById('langFlagStatus');
                statusText.innerHTML = '';
                if (flagEl) {
                    statusText.appendChild(flagEl);

                statusText.className = 'status-text';

                updateLangFlagVisibility();

            function setStatusWarning(message) {
                setStatus(message, 'warning');

                statusText.classList.add('animate-warning');

            function updateLangFlagVisibility() {
                if (mode !== 'full' || !currentLang) {
                    hideLangFlag();

                if (currentStatusMessage && currentStatusMessage.trim() !== '') {
                    hideLangFlag();
                } else {
                    showLangFlag(currentLang);
                }

            function startTimer() {
                if (isMouseInput || state !== 'idle' || pressedKeys.size === 0) return;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                state = 'counting';
                clearAllTimeouts();
                if (mode === 'send') {
                    letterInner.classList.remove('correct', 'error');
                    letterInner.style.color = '';
                    letterInner.style.transform = '';

                mainCard.classList.remove('correct-flash', 'error-flash');
                setStatus('Приготовьтесь', 'warning');
                if (mode === 'send') {
                    letterInner.classList.add('timer-active');
                } else if (mode === 'dictionary') {
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) {
                        activeLetter.classList.add('timer-active');
                    }
                }
                evaluationTimeoutId = setTimeout(() => evaluateSend(), TIMER_DURATION);
            }

            function evaluateSend() {
                const inputCode = getCurrentInputCodeBits().join('');
                const isCorrect = (inputCode === currentCode);
                if (mode === 'send') letterInner.classList.remove('timer-active');
                if (mode === 'dictionary') {
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) activeLetter.classList.remove('timer-active');
                }
                if (evaluationTimeoutId) clearTimeout(evaluationTimeoutId);
                evaluationTimeoutId = null;
                state = 'result';
                if (isCorrect) {
                    handleCorrectAnswer();
                } else {
                    handleWrongAnswer();
                }
                updateInputDots();
                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    if (mode === 'send') {
                        letterInner.classList.remove('correct', 'error', 'timer-active');
                        letterInner.style.color = '';
                        letterInner.style.transform = '';
                    }
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    if (mode === 'dictionary') {
                        const activeLetter = document.querySelector('.word-letter.active');
                        if (activeLetter) {
                            activeLetter.classList.remove('correct', 'error', 'timer-active');
                        }
                    }
                    clearScoreGlow();
                    setStatus('', '');
                    if (isCorrect) {
                        if (mode === 'dictionary') {
                            advanceLetter();
                        } else {
                            showNewLetter();
                        }
                    } else {
                        if (mode === 'dictionary') {
                            resetWordProgress();
                        } else {
                            if (mode === 'send') {
                                letterInner.classList.remove('correct', 'error', 'timer-active');
                                letterInner.style.color = '';
                                letterInner.style.transform = '';
                            }
                            mainCard.classList.remove('correct-flash', 'error-flash');
                            setStatus('', '');
                            resetAllDots();
                            updateTargetDots(currentCode, '');
                            if (pressedKeys.size > 0) {
                                state = 'idle';
                                releaseTimeoutId = setTimeout(() => {
                                    if (pressedKeys.size > 0 && state === 'idle') {
                                        state = 'waitRelease';
                                        setStatusWarning('Отпустите все клавиши');
                                    }
                                    releaseTimeoutId = null;
                                }, RELEASE_DELAY);
                            } else {
                                state = 'idle';
                            }
                            updateInputDots();
                        }
                    }
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function startReceiveChar(char, isMouse) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown) return;
                if (!letterCodes[char]) return;

                receiveKeyIsDown = true;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }

                receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                receiveLetterDisplay.textContent = char;
                receiveLetterDisplay.style.color = '';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';

                requestAnimationFrame(() => {
                    evaluateReceiveChar(char, isMouse);
                });
            }

            function evaluateReceiveChar(pressedChar, isMouse) {
                const isCorrect = pressedChar === currentLetter;
                state = 'result';
                receiveLetterDisplay.classList.remove('reveal', 'timer-active');
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';

                if (isCorrect) {
                    handleCorrectAnswer();
                    for (let d of receiveDots) {
                        if (d.classList.contains('lit')) {
                            d.classList.remove('lit');
                            d.classList.add('correct');
                        }
                    }
                } else {
                    handleWrongAnswer();
                    for (let d of receiveDots) {
                        if (d.classList.contains('lit')) {
                            d.classList.remove('lit');
                            d.classList.add('error');
                        }
                    }
                }

                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    setStatus('', '');
                    clearScoreGlow();
                    if (isCorrect) {
                        showNewReceive();
                    } else {
                        retrySameLetter();
                    }
                    receiveKeyIsDown = false;
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function handleReceiveKey(e) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown || e.repeat) return;

                if (language === 'en') {
                    const key = e.key;
                    if (key && key.length === 1) {
                        const upper = key.toUpperCase();
                        if (upper >= 'A' && upper <= 'Z') {
                            e.preventDefault();
                            startReceiveChar(upper, false);
                            return;
                        }
                    }
                    const engChar = allowedEnglishKeys[e.code];
                    if (engChar) {
                        e.preventDefault();
                        startReceiveChar(engChar, false);
                        return;
                    }
                    return;
                }

                const allowedChars = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
                let char = null;
                if (e.key && e.key.length === 1 && allowedChars.includes(e.key.toUpperCase())) {
                    char = e.key.toUpperCase();
                } else if (codeToRussianMap[e.code]) {
                    char = codeToRussianMap[e.code];
                }
                if (!char) return;
                e.preventDefault();
                startReceiveChar(char, false);
            }

            function handleMouseReceive(char) {
                if (mode !== 'receive') return;
                if (state !== 'idle') return;
                if (receiveKeyIsDown) return;
                if (!letterCodes[char]) return;
                startReceiveChar(char, true);
            }

            function showNewReceive() {
                clearAllTimeouts();
                if (mode !== 'receive') return;
                currentLetter = getRandomLetter();

                    receiveDots[i].classList.remove('correct', 'error');

                receiveLetterDisplay.style.color = 'transparent';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';
                receiveLetterDisplay.textContent = '\u00A0';
                state = 'idle';
                setStatus('', '');
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                receiveKeyIsDown = false;
                clearScoreGlow();
            }

            function retrySameLetter() {
                clearAllTimeouts();
                for (let i = 0; i < 5; i++) {
                    receiveDots[i].classList.remove('correct', 'error');
                    receiveDots[i].classList.toggle('lit', currentCode[i] === '1');
                }
                receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                receiveLetterDisplay.style.color = 'transparent';
                receiveLetterDisplay.style.transform = '';
                receiveLetterDisplay.style.transition = '';
                receiveLetterDisplay.textContent = '\u00A0';
                state = 'idle';
                setStatus('', '');
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                receiveKeyIsDown = false;
                clearScoreGlow();
            }

            function getRandomLetter() {
                const pool = allLetters.filter(l => l !== currentLetter);
                return pool[Math.floor(Math.random() * pool.length)];
            }

            function getDictionaryCode(letter) {
                return letterCodes[letter] || null;
            }

            function initDictionaryWord() {
                const words = getDictionaryWords();
                let available = words.filter(w => !wordHistory.includes(w));
                if (available.length === 0) {
                    available = words;
                    wordHistory = [];
                }
                const randomWord = available[Math.floor(Math.random() * available.length)];
                currentWord = randomWord;
                wordHistory.push(currentWord);
                if (wordHistory.length > 10) {
                    wordHistory.shift();
                }
                currentLetterIndex = 0;
                currentLetter = currentWord[0];
                currentCode = getDictionaryCode(currentLetter);
                renderWord();
                resetAllDots();
                updateTargetDots(currentCode, '');
                if (isMouseInput) {
                    resetMouseInput();
                    state = 'idle';
                } else {
                    updateInputDots();
                    state = 'idle';
                    if (pressedKeys.size > 0) {
                        if (releaseTimeoutId) clearTimeout(releaseTimeoutId);
                        releaseTimeoutId = setTimeout(() => {
                            if (pressedKeys.size > 0 && state === 'idle') {
                                state = 'waitRelease';
                                setStatusWarning('Отпустите все клавиши');
                            }
                            releaseTimeoutId = null;
                        }, RELEASE_DELAY);
                    } else {
                        if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                        setStatus('', '');
                    }
                }
                if (document.querySelector('.word-letter.active')) {
                    document.querySelector('.word-letter.active').classList.remove('timer-active');
                }
            }

            function renderWord() {
                wordDisplay.innerHTML = '';
                for (let i = 0; i < currentWord.length; i++) {
                    const letterSpan = document.createElement('span');
                    letterSpan.className = 'word-letter';
                    letterSpan.textContent = currentWord[i];
                    if (i === currentLetterIndex) {
                        letterSpan.classList.add('active');
                    }
                    wordDisplay.appendChild(letterSpan);
                }
            }

            function showLangFlag(lang) {
                if (mode !== 'full' || !lang) {
                    hideLangFlag();
                    return;
                }
                langFlagStatus.textContent = lang === 'ru' ? '🇷🇺' : '🇬🇧';
                langFlagStatus.style.display = 'block';
            }

            function hideLangFlag() {
                langFlagStatus.style.display = 'none';
            }

            function advanceLetter() {
                currentLetterIndex++;
                if (currentLetterIndex < currentWord.length) {
                    currentLetter = currentWord[currentLetterIndex];
                    currentCode = getDictionaryCode(currentLetter);
                    renderWord();
                    resetAllDots();
                    updateTargetDots(currentCode, '');
                    if (isMouseInput) {
                        resetMouseInput();
                        state = 'idle';
                    } else {
                        updateInputDots();
                        state = 'idle';
                        if (pressedKeys.size > 0) {
                            if (releaseTimeoutId) clearTimeout(releaseTimeoutId);
                            releaseTimeoutId = setTimeout(() => {
                                if (pressedKeys.size > 0 && state === 'idle') {
                                    state = 'waitRelease';
                                    setStatusWarning('Отпустите все клавиши');
                                }
                                releaseTimeoutId = null;
                            }, RELEASE_DELAY);
                        } else {
                            if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                            setStatus('', '');
                        }
                    }
                    setStatus('', '');
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) activeLetter.classList.remove('timer-active');
                } else {
                    const wordLength = currentWord.length;
                    const oldStreak = streak;
                    streak += wordLength;
                    streakValue.textContent = streak;

                    let crossedMilestone = false;
                    const next10 = Math.ceil((oldStreak + 1) / 10) * 10;
                    if (next10 <= streak) crossedMilestone = true;
                    if (streak >= 100) {
                        const next100 = Math.ceil((oldStreak + 1) / 100) * 100;
                        if (next100 <= streak) crossedMilestone = true;
                    }

                    if (crossedMilestone) {
                        streakBadge.classList.add('correct-streak');
                        streakValue.classList.add('glow-correct');
                        playStreak();
                    } else {
                        streakBadge.classList.add('flash');
                        setTimeout(() => streakBadge.classList.remove('flash'), RESULT_DISPLAY);
                    }

                    if (!hintVisible && streak > record) {
                        record = streak;
                        recordValue.textContent = record;
                        saveRecord();
                        if (crossedMilestone) {
                            recordBadge.classList.add('record-correct');
                            recordValue.classList.add('glow-correct');
                        }
                    }
                    setStatus('Слово завершено!', 'success');
                    initDictionaryWord();
                }
            }

            function resetWordProgress() {
                currentLetterIndex = 0;
                currentLetter = currentWord[0];
                currentCode = getDictionaryCode(currentLetter);
                renderWord();
                resetAllDots();
                updateTargetDots(currentCode, '');
                if (isMouseInput) {
                    resetMouseInput();
                    state = 'idle';
                } else {
                    updateInputDots();
                    state = 'idle';
                    if (pressedKeys.size > 0) {
                        if (releaseTimeoutId) clearTimeout(releaseTimeoutId);
                        releaseTimeoutId = setTimeout(() => {
                            if (pressedKeys.size > 0 && state === 'idle') {
                                state = 'waitRelease';
                                setStatusWarning('Отпустите все клавиши');
                            }
                            releaseTimeoutId = null;
                        }, RELEASE_DELAY);
                    } else {
