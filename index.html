            function showNewSymbol() {
                clearAllTimeouts();
                if (mode === 'send') {
                    currentLetter = getRandomLetter();
                    currentCode = letterCodes[currentLetter];
                    currentDirections = '';
                    currentLang = null;
                    letterInner.classList.remove('correct', 'error', 'timer-active');
                    letterInner.textContent = currentLetter;
                    letterInner.style.color = '';
                    letterInner.style.transform = '';
                    const flagSpan = letterDisplay.querySelector('.lang-flag');
                    if (flagSpan) flagSpan.remove();
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    setStatus('', '');
                    resetAllDots();
                    updateTargetDots(currentCode, '');
                    if (!isMouseInput && pressedKeys.size > 0) {
                        state = 'idle';
                        releaseTimeoutId = setTimeout(() => {
                            if (pressedKeys.size > 0 && state === 'idle') {
                                state = 'waitRelease';
                                setStatusWarning('Отпустите все клавиши');
                            }
                            releaseTimeoutId = null;
                        }, RELEASE_DELAY);
                    } else state = 'idle';
                    updateInputDots();
                    clearScoreGlow();
                    receiveLetterDisplay.classList.remove('correct', 'error');
                    return;
                }

                if (mode === 'full') {
                    const available = fullSymbols.filter(s => s.symbol !== currentLetter || s.lang !== currentLang);
                    let sym;
                    if (available.length === 0) {
                        const idx = Math.floor(Math.random() * fullSymbols.length);
                        sym = fullSymbols[idx];
                    } else {
                        const idx = Math.floor(Math.random() * available.length);
                        sym = available[idx];
                    }
                    currentLetter = sym.symbol;
                    currentCode = sym.code;
                    currentDirections = sym.directions || '';
                    currentLang = sym.lang || null;
                    letterInner.classList.remove('correct', 'error', 'timer-active');
                    letterInner.textContent = currentLetter;
                    letterInner.style.color = '';
                    letterInner.style.transform = '';
                    const oldFlag = letterDisplay.querySelector('.lang-flag');
                    if (oldFlag) oldFlag.remove();
                    updateLangFlagVisibility();
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    setStatus('', '');
                    resetAllDots();
                    updateTargetDots(currentCode, currentDirections);
                    if (!isMouseInput && pressedKeys.size > 0) {
                        state = 'idle';
                        releaseTimeoutId = setTimeout(() => {
                            if (pressedKeys.size > 0 && state === 'idle') {
                                state = 'waitRelease';
                                setStatusWarning('Отпустите все клавиши');
                            }
                            releaseTimeoutId = null;
                        }, RELEASE_DELAY);
                    } else state = 'idle';
                    updateInputDots();
                    clearScoreGlow();
                    receiveLetterDisplay.classList.remove('correct', 'error');
                    return;
                }
            }

            function showNewLetter() {
                if (mode === 'send') {
                    showNewSymbol();
                }
            }

            function handleKeyDown(e) {
                if (mode === 'full') {
                    e.preventDefault();
                    return;
                }
                if (mode === 'chat') {
                    if (isTouchDevice && chatTouchGrid.style.display !== 'none') return;
                    if (!allRelevantCodes.has(e.code)) return;
                    e.preventDefault();
                    if (e.repeat) return;
                    pressedKeys.add(e.code);
                    updateChatSendDots();
                    return;
                }

                if (mode === 'dictionary') {
                    if (isMouseInput) {
                        e.preventDefault();
                        deactivateMouseInput();
                    }
                    if (!allRelevantCodes.has(e.code)) return;
                    e.preventDefault();

                    if (state === 'waitRelease' || state === 'result') {
                        pressedKeys.add(e.code);
                        updateInputDots();
                        return;
                    }

                    const wasEmpty = pressedKeys.size === 0;
                    pressedKeys.add(e.code);
                    updateInputDots();

                    if (state === 'idle' && wasEmpty) {
                        playClickSafe();
                        startTimer();
                    }
                    return;
                }

                if (isMouseInput) {
                    e.preventDefault();
                    deactivateMouseInput();
                }
                if (mode === 'receive') {
                    handleReceiveKey(e);
                    return;
                }
                if (!allRelevantCodes.has(e.code)) return;
                e.preventDefault();

                const wasEmpty = pressedKeys.size === 0;

                if (state === 'waitRelease' || state === 'result') {
                    pressedKeys.add(e.code);
                    updateInputDots();
                    return;
                }

                pressedKeys.add(e.code);
                updateInputDots();

                if (wasEmpty && mode === 'send' && !isMouseInput && state === 'idle') {
                    playClickSafe();
                }

                if (state === 'idle' && wasEmpty) {
                    startTimer();
                }
            }

            function handleKeyUp(e) {
                if (mode === 'full') {
                    e.preventDefault();
                    return;
                }
                if (mode === 'chat') {
                    if (isTouchDevice && chatTouchGrid.style.display !== 'none') return;
                    if (!allRelevantCodes.has(e.code)) return;
                    e.preventDefault();
                    pressedKeys.delete(e.code);
                    updateChatSendDots();
                    return;
                }

                if (mode === 'dictionary') {
                    if (!allRelevantCodes.has(e.code)) return;
                    e.preventDefault();
                    pressedKeys.delete(e.code);
                    updateInputDots();
                    if (state === 'counting' && pressedKeys.size === 0) {
                        clearTimeout(evaluationTimeoutId);
                        evaluationTimeoutId = null;
                        const activeLetter = document.querySelector('.word-letter.active');
                        if (activeLetter) activeLetter.classList.remove('timer-active');
                        state = 'idle';
                        setStatus('', '');
                    }
                    if (state === 'idle' && pressedKeys.size === 0 && releaseTimeoutId) {
                        clearTimeout(releaseTimeoutId);
                        releaseTimeoutId = null;
                        setStatus('', '');
                    }
                    if (state === 'waitRelease' && pressedKeys.size === 0) {
                        state = 'idle';
                        setStatus('', '');
                    }
                    return;
                }

                if (mode === 'receive') {
                    receiveKeyIsDown = false;
                    if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                    if (state === 'waitRelease') {
                        state = 'idle';
                        setStatus('', '');
                    }
                    return;
                }
                if (!allRelevantCodes.has(e.code)) return;
                e.preventDefault();
                pressedKeys.delete(e.code);
                updateInputDots();
                if (state === 'counting' && pressedKeys.size === 0) {
                    clearTimeout(evaluationTimeoutId);
                    evaluationTimeoutId = null;
                    letterInner.classList.remove('timer-active');
                    letterInner.style.color = '';
                    letterInner.style.transform = '';
                    setStatus('', '');
                    state = 'idle';
                }
                if (state === 'idle' && pressedKeys.size === 0 && releaseTimeoutId) {
                    clearTimeout(releaseTimeoutId);
                    releaseTimeoutId = null;
                    setStatus('', '');
                }
                if (state === 'waitRelease' && pressedKeys.size === 0) {
                    state = 'idle';
                    setStatus('', '');
                }
            }

            function handleBlur() {
                if (mode === 'full') return;
                if (pressedKeys.size > 0) {
                    pressedKeys.clear();
                    updateInputDots();
                }
                receiveKeyIsDown = false;
                if (releaseTimeoutId) { clearTimeout(releaseTimeoutId); releaseTimeoutId = null; }
                if (evaluationTimeoutId) { clearTimeout(evaluationTimeoutId); evaluationTimeoutId = null; }
                if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
                if (state === 'counting' || state === 'reveal') {
                    state = 'idle';
                    letterInner.classList.remove('timer-active');
                    letterInner.style.color = '';
                    letterInner.style.transform = '';
                    receiveLetterDisplay.textContent = '\u00A0';
                    receiveLetterDisplay.classList.remove('reveal', 'timer-active');
                    receiveLetterDisplay.style.color = 'transparent';
                    receiveLetterDisplay.style.transform = '';
                    receiveLetterDisplay.style.transition = '';
                    if (mode === 'dictionary') {
                        const activeLetter = document.querySelector('.word-letter.active');
                        if (activeLetter) activeLetter.classList.remove('timer-active');
                    }
                }
                if (state === 'waitRelease') {
                    state = 'idle';
                    setStatus('', '');
                }
                if (mode === 'chat') {
                    updateChatSendDots();
                }
            }

            function handleMouseConfirm() {
                if ((mode !== 'send' && mode !== 'dictionary' && mode !== 'full') || !isMouseInput || state !== 'idle') return;
                if (!currentLetter || !currentCode) return;

                const sumBits = mouseInputBits.reduce((a, b) => a + b, 0);
                if (sumBits === 0 && mouseDirections.length === 0) {
                    setStatus('Введите символ', 'warning');
                    statusText.classList.remove('animate-warning');
                    void statusText.offsetWidth;
                    statusText.classList.add('animate-warning');
                    setTimeout(() => statusText.classList.remove('animate-warning'), 200);
                    return;
                }

                const inputCode = mouseInputBits.join('');
                const inputDirs = mouseDirections.join('');
                const isCorrect = (inputCode === currentCode) && (inputDirs === currentDirections);
                clearAllTimeouts();
                state = 'result';

                mouseConfirmBtn.classList.remove('correct', 'error');
                if (isCorrect) {
                    handleCorrectAnswer();
                } else {
                    handleWrongAnswer();
                }

                resultTimeoutId = setTimeout(() => {
                    mainCard.classList.remove('correct-flash', 'error-flash');
                    letterInner.classList.remove('correct', 'error');
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    if (mode === 'dictionary') {
                        const activeLetter = document.querySelector('.word-letter.active');
                        if (activeLetter) {
                            activeLetter.classList.remove('correct', 'error', 'timer-active');
                        }
                    }
                    clearScoreGlow();
                    setStatus('', '');
                    if (isCorrect) {
                        if (mode === 'dictionary') {
                            advanceLetter();
                        } else {
                            showNewSymbol();
                            resetMouseInput();
                        }
                    } else {
                        if (mode === 'dictionary') {
                            resetWordProgress();
                        } else {
                            resetAllDots();
                            updateTargetDots(currentCode, currentDirections);
                            resetMouseInput();
                            state = 'idle';
                            setStatus('', '');
                            updateInputDots();
                        }
                    }
                    resultTimeoutId = null;
                }, RESULT_DISPLAY);
            }

            function handleInputDotClick(e) {
                // ======= ИСПРАВЛЕНИЕ 1: автоматическая активация мыши при первом клике =======
                if (!isMouseInput) {
                    activateMouseInput();
                    // после активации продолжаем обработку клика
                }
                const dot = e.target.closest('.input-dot');
                if (!dot) return;
                e.preventDefault();
                e.stopPropagation();

                const finger = parseInt(dot.dataset.finger, 10);
                if (!isNaN(finger) && finger >= 0 && finger < 5) {
                    mouseInputBits[finger] = mouseInputBits[finger] ? 0 : 1;
                    updateInputDots();
                    if (statusText.textContent === 'Введите позицию' || statusText.textContent === 'Введите символ') {
                        setStatus('', '');
                    }
                    playClickSafe();
                    return;
                }

                const dir = dot.dataset.dir;
                if (dir && mode === 'full') {
                    const idx = mouseDirections.indexOf(dir);
                    if (idx !== -1) {
                        mouseDirections.splice(idx, 1);
                    } else {
                        if (mouseDirections.length < 2) {
                            mouseDirections.push(dir);
                        }
                    }
                    updateInputDots();
                    if (statusText.textContent === 'Введите символ') {
                        setStatus('', '');
                    }
                    playClickSafe();
                }
            }

            // ======================== TOUCH CHAT HANDLERS ========================
            function setupTouchChat() {
                const handlePointerDown = (bit) => {
                    touchSendBits[bit] = 1;
                    updateTouchSendDisplay();
                    sendTouchCode();
                };
                const handlePointerUp = (bit) => {
                    touchSendBits[bit] = 0;
                    updateTouchSendDisplay();
                    sendTouchCode();
                };

                touchSendCells.forEach(cell => {
                    const bit = parseInt(cell.dataset.bit, 10);
                    cell.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        cell.setPointerCapture(e.pointerId);
                        handlePointerDown(bit);
                    });
                    cell.addEventListener('pointerup', (e) => {
                        e.preventDefault();
                        handlePointerUp(bit);
                    });
                    cell.addEventListener('pointerleave', (e) => {
                        if (cell.hasPointerCapture(e.pointerId)) {
                            handlePointerUp(bit);
                        }
                    });
                    cell.addEventListener('pointercancel', (e) => {
                        handlePointerUp(bit);
                    });
                });

                touchReceiveCells.forEach(cell => {
                    const bit = parseInt(cell.dataset.bit, 10);
                    cell.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        cell.setPointerCapture(e.pointerId);
                        handlePointerDown(bit);
                    });
                    cell.addEventListener('pointerup', (e) => {
                        e.preventDefault();
                        handlePointerUp(bit);
                    });
                    cell.addEventListener('pointerleave', (e) => {
                        if (cell.hasPointerCapture(e.pointerId)) {
                            handlePointerUp(bit);
                        }
                    });
                    cell.addEventListener('pointercancel', (e) => {
                        handlePointerUp(bit);
                    });
                });
            }

            function updateTouchSendDisplay() {
                touchSendCells.forEach(cell => {
                    const bit = parseInt(cell.dataset.bit, 10);
                    cell.classList.toggle('pressed', touchSendBits[bit] === 1);
                });
            }

            function sendTouchCode() {
                const code = touchSendBits.join('');
                if (connectedToPeer && conn && conn.open) {
                    conn.send(code);
                }
            }

            function updateTouchReceiveDisplay(codeStr) {
                touchReceiveCells.forEach(cell => {
                    const bit = parseInt(cell.dataset.bit, 10);
                    cell.classList.toggle('lit', codeStr[bit] === '1');
                });
            }

                menuDropdown.classList.remove('open');
                playClickSafe();
            }

            function setModeUI() {
                const isChat = mode === 'chat';
                const isFull = mode === 'full';
                const container = document.querySelector('.container');
                const contentArea = document.getElementById('contentArea');

                if (isChat) {
                    container.classList.add('chat-mode');
                } else {
                    container.classList.remove('chat-mode');
                }

                mainCard.style.display = isChat ? 'none' : '';
                instructionsWrapper.style.display = (isChat || isFull) ? 'none' : '';
                mouseConfirmWrapper.style.display = (isChat || isFull) ? 'none' : '';
                if (isFull || mode === 'send' || mode === 'dictionary') {
                    if (isMouseInput) mouseConfirmWrapper.style.display = 'flex';
                }

                if (isChat && isTouchDevice) {
                    chatContainer.style.display = 'none';
                    chatTouchGrid.style.display = 'flex';
                    container.classList.add('chat-layout');
                    contentArea.classList.add('chat-layout');
                } else if (isChat) {
                    chatContainer.style.display = 'block';
                    chatTouchGrid.style.display = 'none';
                    container.classList.remove('chat-layout');
                    contentArea.classList.remove('chat-layout');
                } else {
                    chatContainer.style.display = 'none';
                    chatTouchGrid.style.display = 'none';
                    container.classList.remove('chat-layout');
                    contentArea.classList.remove('chat-layout');
                }

                if (isChat) {
                    streakBadge.style.display = 'none';
                    recordBadge.style.display = 'none';
                } else {
                    streakBadge.style.display = 'flex';
                    recordBadge.style.display = 'flex';
                }
                if (hintVisible && !isChat) {
                    recordBadge.style.display = 'none';
                    hintBadge.style.display = 'flex';
                } else if (!isChat) {
                    recordBadge.style.display = 'flex';
                    hintBadge.style.display = 'none';
                } else {
                    hintBadge.style.display = 'none';
                }

                menuHintToggle.style.display = (isChat) ? 'none' : '';
                menuLangToggle.style.display = (isChat || isFull) ? 'none' : '';

                radioSend.textContent = mode === 'send' ? '●' : '○';
                radioReceive.textContent = mode === 'receive' ? '●' : '○';
                radioDictionary.textContent = mode === 'dictionary' ? '●' : '○';
                radioFull.textContent = isFull ? '●' : '○';
                radioChat.textContent = isChat ? '●' : '○';
                radioSend.className = 'menu-item-radio' + (mode === 'send' ? ' active' : '');
                radioReceive.className = 'menu-item-radio' + (mode === 'receive' ? ' active' : '');
                radioDictionary.className = 'menu-item-radio' + (mode === 'dictionary' ? ' active' : '');
                radioFull.className = 'menu-item-radio' + (isFull ? ' active' : '');
                radioChat.className = 'menu-item-radio' + (isChat ? ' active' : '');

                modeItems.forEach(item => item.classList.remove('active'));
                const activeModeItem = document.querySelector(`.mode-item[data-mode="${mode}"]`);
                if (activeModeItem) activeModeItem.classList.add('active');

                if (isChat) {
                    menuBtn.style.display = 'none';
                    menuBtnAlt.style.display = 'inline-flex';
                    menuConnectionSection.style.display = '';
                    updateConnectionUI();
                } else {
                    menuBtn.style.display = '';
                    menuBtnAlt.style.display = 'none';
                    menuConnectionSection.style.display = 'none';
                }

                const menuDropdownElem = document.getElementById('menuDropdown');
                const titleArea = document.querySelector('.title-area');
                const headerRight = document.querySelector('.header-right');
                const infoBtn = document.getElementById('menuInfo');
                const infoSection = infoBtn.parentElement;

                if (isChat) {
                    if (menuDropdownElem.parentElement !== titleArea) {
                        titleArea.appendChild(menuDropdownElem);
                    }
                    let existingDivider = infoSection.previousElementSibling;
                    if (!existingDivider || existingDivider.className !== 'menu-divider') {
                        const divider = document.createElement('div');
                        divider.className = 'menu-divider';
                        infoSection.parentElement.insertBefore(divider, infoSection);
                    }
                } else {
                    if (menuDropdownElem.parentElement !== headerRight) {
                        headerRight.appendChild(menuDropdownElem);
                    }
                    const possibleDivider = infoSection.previousElementSibling;
                    if (possibleDivider && possibleDivider.className === 'menu-divider') {
                        possibleDivider.remove();
                    }
                }

                if (isChat) {
                    if (isMouseInput) {
                        isMouseInput = false;
                        inputDotsContainer.classList.remove('mouse-active');
                        resetMouseInput();
                    }
                    if (!isTouchDevice) {
                        updateChatSendDots();
                    } else {
                        updateTouchSendDisplay();
                    }
                    return;
                }

                if (!isFull) {
                    hideLangFlag();
                }

                if (isFull) {
                    letterDisplay.style.display = '';
                    receiveArea.style.display = 'none';
                    dictionaryWordArea.style.display = 'none';
                    hintWrapper.classList.toggle('hint-hidden', !hintVisible);
                    if (!isMouseInput) {
                        isMouseInput = true;
                        inputDotsContainer.classList.add('mouse-active');
                    }
                    updateMouseUI();
                    instructionsWrapper.classList.add('hint-hidden');
                    document.getElementById('hintRow').style.display = '';
                    document.getElementById('inputRow').style.display = '';
                    letterInner.classList.remove('reveal', 'correct', 'error');
                    if (!currentLetter) showNewSymbol();
                    else {
                        letterInner.textContent = currentLetter;
                        const oldFlag = letterDisplay.querySelector('.lang-flag');
                        if (oldFlag) oldFlag.remove();
                        updateLangFlagVisibility();
                        updateTargetDots(currentCode, currentDirections);
                    }
                    resetMouseInput();
                    return;
                }

                if (mode === 'dictionary') {
                    letterDisplay.style.display = 'none';
                    receiveArea.style.display = 'none';
                    dictionaryWordArea.style.display = '';
                    hintWrapper.classList.toggle('hint-hidden', !hintVisible);
                    mouseConfirmBtn.classList.remove('correct', 'error');
                    if (isMouseInput) {
                        updateMouseUI();
                    } else {
                        updateKeyboardUI();
                        if (hintVisible) {
                            instructionKeyboard.style.display = 'flex';
                            decodingTableContainer.style.display = 'none';
                            alphabetButtons.style.display = 'none';
                        } else {
                            instructionKeyboard.style.display = 'none';
                            decodingTableContainer.style.display = 'none';
                            alphabetButtons.style.display = 'none';
                        }
                        instructionsWrapper.classList.toggle('hint-hidden', !hintVisible);
                    }
                    mouseConfirmWrapper.style.display = isMouseInput ? 'flex' : 'none';
                    document.getElementById('hintRow').style.display = '';
                    document.getElementById('inputRow').style.display = '';
                    patternsSection.style.display = '';
                } else {
                    const isSend = mode === 'send';
                    mainCard.classList.toggle('send-mode', isSend);
                    dictionaryWordArea.style.display = 'none';
                    modeSendArea.style.display = '';
                    patternsSection.style.display = '';
                    if (isSend) {
                        letterDisplay.style.display = '';
                        receiveArea.style.display = 'none';
                        hintWrapper.classList.toggle('hint-hidden', !hintVisible);
                        if (lastSendInputMode) {
                            activateMouseInput();
                        } else {
                            if (isMouseInput) deactivateMouseInput();
                            else updateKeyboardUI();
                        }
                        instructionsWrapper.classList.toggle('hint-hidden', !hintVisible || isMouseInput);
                        document.getElementById('hintRow').style.display = '';
                        document.getElementById('inputRow').style.display = '';
                        letterInner.classList.remove('reveal', 'correct', 'error');
                        if (!currentLetter) showNewLetter();
                        else {
                            letterInner.textContent = currentLetter;
                            const flag = letterDisplay.querySelector('.lang-flag');
                            if (flag) flag.remove();
                            updateTargetDots(currentCode, '');
                        }
                    } else {
                        letterDisplay.style.display = 'none';
                        receiveArea.style.display = 'flex';
                        instructionsWrapper.style.display = '';
                        if (hintVisible) {
                            instructionKeyboard.style.display = 'none';
                            decodingTableContainer.style.display = 'block';
                            alphabetButtons.style.display = 'none';
                            instructionsWrapper.classList.remove('hint-hidden');
                            buildDecodingTable();
                        } else {
                            instructionKeyboard.style.display = 'none';
                            decodingTableContainer.style.display = 'none';
                            alphabetButtons.style.display = 'flex';
                            instructionsWrapper.classList.remove('hint-hidden');
                            buildAlphabetButtons();
                        }
                        document.getElementById('hintRow').style.display = 'none';
                        document.getElementById('inputRow').style.display = 'none';
                        receiveLetterDisplay.classList.remove('correct', 'error', 'reveal', 'timer-active');
                        receiveLetterDisplay.style.color = 'transparent';
                        receiveLetterDisplay.style.transform = '';
                        receiveLetterDisplay.style.transition = '';
                        receiveLetterDisplay.textContent = '\u00A0';
                        mouseConfirmWrapper.style.display = 'none';
                        if (!currentLetter) showNewReceive();
                        else {
                            for (let i = 0; i < 5; i++) {
                                receiveDots[i].classList.remove('correct', 'error');
                                receiveDots[i].classList.toggle('lit', currentCode[i] === '1');
                            }
                            receiveLetterDisplay.textContent = '\u00A0';
                            receiveLetterDisplay.style.color = 'transparent';
                        }
                    }
                }
                updateHintWarning();
                updateLangButton();
                if (statusText.textContent === '' || statusText.classList.contains('info')) {
                    setStatus('', '');
                }
                clearScoreGlow();
                updateSoundButton();
            }

            // ======================== CHAT ========================
            function initPeer() {
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                const id = Math.random().toString(36).substr(2, 8);
                peer = new Peer(id);
                peer.on('open', (peerId) => {
                    peerIdDisplay.textContent = peerId;
                    if (peerIdDisplayMenu) peerIdDisplayMenu.textContent = peerId;
                    updateConnectionUI();
                });
                peer.on('connection', (incomingConn) => {
                    if (conn) {
                        conn.close();
                    }
                    conn = incomingConn;
                    setupConnection();
                });
                peer.on('disconnected', () => {
                    if (peer) peer.reconnect();
                });
                peer.on('error', (err) => {
                    console.error('PeerJS error:', err);
                });
            }

            function setupConnection() {
                conn.on('open', () => {
                    connectedToPeer = true;
                    updateConnectionUI();
                });
                conn.on('data', (data) => {
                    if (typeof data === 'string' && data.length === 5) {
                        updateChatReceiveDots(data);
                        if (isTouchDevice) updateTouchReceiveDisplay(data);
                    }
                });
                conn.on('close', () => {
                    onDisconnect();
                });
                conn.on('error', (err) => {
                    console.error('Connection error:', err);
                    onDisconnect();
                });
            }

            function onDisconnect() {
                connectedToPeer = false;
                conn = null;
                updateConnectionUI();
                chatReceiveDots.forEach(d => d.classList.remove('lit'));
                touchReceiveCells.forEach(d => d.classList.remove('lit'));
            }

            function connectToPeer() {
                const remoteId = remotePeerIdInput.value.trim() || remotePeerIdInputMenu.value.trim();
                if (!remoteId || !peer) return;
                if (conn) conn.close();
                conn = peer.connect(remoteId);
                setupConnection();
            }

            function disconnectPeer() {
                if (conn) {
                    conn.close();
                }
                onDisconnect();
            }

            function updateConnectionUI() {
                const isConnected = connectedToPeer && conn && conn.open;
                connectPeerBtn.style.display = isConnected ? 'none' : 'inline-flex';
                disconnectPeerBtn.style.display = isConnected ? 'inline-flex' : 'none';
                remotePeerIdInput.disabled = isConnected;

                if (connectPeerBtnMenu) {
                    connectPeerBtnMenu.style.display = isConnected ? 'none' : 'inline-flex';
                    disconnectPeerBtnMenu.style.display = isConnected ? 'inline-flex' : 'none';
                    if (remotePeerIdInputMenu) remotePeerIdInputMenu.disabled = isConnected;
                }
            }

            function updateChatReceiveDots(codeStr) {
                for (let i = 0; i < 5; i++) {
                    chatReceiveDots[i].classList.toggle('lit', codeStr[i] === '1');
                }
            }

            function updateChatSendDots() {
                const code = getCurrentInputCodeBits().join('');
                for (let i = 0; i < 5; i++) {
                    chatSendDots[i].classList.toggle('pressed', code[i] === '1');
                }
                if (connectedToPeer && conn && conn.open) {
                    conn.send(code);
                }
            }

            function copyPeerId() {
                const id = peerIdDisplay.textContent;
                if (!id) return;
                navigator.clipboard.writeText(id).then(() => {
                    copyPeerIdBtn.textContent = '✓';
                    if (copyPeerIdBtnMenu) copyPeerIdBtnMenu.textContent = '✓';
                    setTimeout(() => {
                        copyPeerIdBtn.textContent = '📋';
                        if (copyPeerIdBtnMenu) copyPeerIdBtnMenu.textContent = '📋';
                    }, 2000);
                }).catch(() => {
                    const input = document.createElement('input');
                    input.value = id;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    copyPeerIdBtn.textContent = '✓';
                    if (copyPeerIdBtnMenu) copyPeerIdBtnMenu.textContent = '✓';
                    setTimeout(() => {
                        copyPeerIdBtn.textContent = '📋';
                        if (copyPeerIdBtnMenu) copyPeerIdBtnMenu.textContent = '📋';
                    }, 2000);
                });
            }

            function isStreakMilestone(n) {
                if (n <= 0) return false;
                if (n <= 100) return n % 10 === 0;
                return n % 100 === 0;
            }

            function handleCorrectAnswer() {
                if (mode !== 'dictionary') {
                    streak++;
                    streakValue.textContent = streak;
                    const milestone = isStreakMilestone(streak);
                    if (milestone) {
                        streakBadge.classList.add('correct-streak');
                        streakValue.classList.add('glow-correct');
                        playStreak();
                    } else {
                        streakBadge.classList.add('flash');
                        playCorrect();
                        setTimeout(() => streakBadge.classList.remove('flash'), RESULT_DISPLAY);
                    }
                    if (!hintVisible && streak > record) {
                        record = streak;
                        recordValue.textContent = record;
                        saveRecord();
                        if (milestone) {
                            recordBadge.classList.add('record-correct');
                            recordValue.classList.add('glow-correct');
                        }
                    }
                } else {
                    playCorrect();
                }

                if (mode === 'send' || mode === 'full') {
                    letterInner.classList.add('correct');
                }
                if (mode === 'dictionary') {
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) activeLetter.classList.add('correct');
                }
                if (mode === 'receive') {
                    receiveLetterDisplay.classList.add('correct');
                }
                mainCard.classList.add('correct-flash');
                if (mode !== 'dictionary' || isMouseInput) {
                    mouseConfirmBtn.classList.add('correct');
                }
                setStatus('✓ Верно!', 'success');
            }

            function handleWrongAnswer() {
                streak = 0;
                streakValue.textContent = '0';
                streakBadge.classList.add('error-streak');
                streakValue.classList.add('glow-error');
                playWrong();

                if (mode === 'send' || mode === 'full') {
                    letterInner.classList.add('error');
                }
                if (mode === 'dictionary') {
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) {
                        activeLetter.classList.add('error');
                    }
                }
                if (mode === 'receive') {
                    receiveLetterDisplay.classList.add('error');
                }
                mainCard.classList.add('error-flash');
                if (mode !== 'dictionary' || isMouseInput) {
                    mouseConfirmBtn.classList.add('error');
                }
                setStatus('✗ Неверно. Попробуйте снова.', 'fail');
            }

            function clearScoreGlow() {
                streakBadge.classList.remove('correct-streak', 'error-streak', 'flash');
                streakValue.classList.remove('glow-correct', 'glow-error');
                recordBadge.classList.remove('record-correct');
                recordValue.classList.remove('glow-correct');
                if (mode === 'receive') {
                    receiveLetterDisplay.classList.remove('correct', 'error');
                }
                if (mode === 'dictionary') {
                    const activeLetter = document.querySelector('.word-letter.active');
                    if (activeLetter) {
                        activeLetter.classList.remove('correct', 'error', 'timer-active');
                    }
                }
                if (mode === 'send' || mode === 'full') {
                    letterInner.classList.remove('correct', 'error');
                }
            }

            function saveRecord() {
                try { localStorage.setItem(STORAGE_KEY, record.toString()); } catch (e) {}
            }

            function loadRecord() {
                try {
                    const saved = parseInt(localStorage.getItem(STORAGE_KEY), 10);
                    record = isNaN(saved) ? 0 : saved;
                } catch (e) { record = 0; }
                recordValue.textContent = record;
            }

            function toggleHint() {
                hintVisible = !hintVisible;
                if (!hintVisible) {
                    streak = 0;
                    streakValue.textContent = '0';
                    streakBadge.classList.remove('flash', 'correct-streak', 'error-streak');
                    streakValue.classList.remove('glow-correct', 'glow-error');
                    recordBadge.classList.remove('record-correct');
                    recordValue.classList.remove('glow-correct');
                    setStatus('Подсказки изменены — счёт сброшен', 'warning');
                    if (statusTimeoutId) clearTimeout(statusTimeoutId);
                    statusTimeoutId = setTimeout(() => {
                        if (statusText.textContent === 'Подсказки изменены — счёт сброшен') {
                            setStatus('', '');
                        }
                        statusTimeoutId = null;
                    }, 5000);
                } else {
                    if (statusTimeoutId) {
                        clearTimeout(statusTimeoutId);
                        statusTimeoutId = null;
                    }
                    setStatus('', '');
                }
                playClickSafe();
                const isFull = mode === 'full';
                if (isFull) {
                    hintWrapper.classList.toggle('hint-hidden', !hintVisible);
                } else {
                    applyHintVisibility();
                }
                menuHintIcon.textContent = hintVisible ? '☑' : '☐';
                updateHintWarning();
                menuDropdown.classList.remove('open');
                recordValue.textContent = record;
            }

            function applyHintVisibility() {
                if (mode === 'chat' || mode === 'full') return;
                hintWrapper.classList.toggle('hint-hidden', !hintVisible);
                if (mode === 'dictionary') {
                    if (isMouseInput) {
                        updateMouseUI();
                    } else {
                        updateKeyboardUI();
                        if (hintVisible) {
                            instructionKeyboard.style.display = 'flex';
                        } else {
                            instructionKeyboard.style.display = 'none';
                        }
                        instructionsWrapper.classList.toggle('hint-hidden', !hintVisible);
                    }
                    menuHintIcon.textContent = hintVisible ? '☑' : '☐';
                    updateHintWarning();
                    clearScoreGlow();
                    if (currentCode) updateTargetDots(currentCode, '');
                    return;
                }
                const isReceive = mode === 'receive';
                const isSend = mode === 'send';
                if (isReceive) {
                    instructionsWrapper.classList.remove('hint-hidden');
                    instructionKeyboard.style.display = 'none';
                    if (hintVisible) {
                        decodingTableContainer.style.display = 'block';
                        alphabetButtons.style.display = 'none';
                        buildDecodingTable();
                    } else {
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'flex';
                        buildAlphabetButtons();
                    }
                } else if (isSend) {
                    if (isMouseInput) {
                        instructionsWrapper.classList.add('hint-hidden');
                        instructionKeyboard.style.display = 'none';
                        decodingTableContainer.style.display = 'none';
                        alphabetButtons.style.display = 'none';
                        mouseConfirmWrapper.style.display = 'flex';
                    } else {
                        if (hintVisible) {
                            instructionsWrapper.classList.remove('hint-hidden');
                            instructionKeyboard.style.display = 'flex';
                            mouseConfirmWrapper.style.display = 'none';
                        } else {
                            instructionsWrapper.classList.add('hint-hidden');
                            instructionKeyboard.style.display = 'none';
                            mouseConfirmWrapper.style.display = 'none';
                        }
                    }
                }
                menuHintIcon.textContent = hintVisible ? '☑' : '☐';
                updateHintWarning();
                clearScoreGlow();
            }

            function toggleSound() {
                soundEnabled = !soundEnabled;
                updateSoundButton();
                if (soundEnabled) {
                    playClickSafe();
                }
                menuDropdown.classList.remove('open');
            }

            function updateSoundButton() {
                if (soundEnabled) {
                    menuSoundIcon.textContent = '𝆔';
                    menuSoundLabel.textContent = 'Звук Выкл.';
                } else {
                    menuSoundIcon.textContent = '𝆕';
                    menuSoundLabel.textContent = 'Звук Вкл.';
                }
            }

            // ======================== INIT ========================
            function init() {
                loadRecord();
                document.addEventListener('keydown', handleKeyDown);
                document.addEventListener('keyup', handleKeyUp);
                window.addEventListener('blur', handleBlur);
                mode = 'send';
                setModeUI();
                updateFingerLabels();
                updateInstruction();
                showNewLetter();
                if (isTouchDevice && lastSendInputMode) {
                    activateMouseInput();
                }
                streakValue.textContent = '0';
                recordValue.textContent = record;
                buildDecodingTable();
                buildAlphabetButtons();
                updateSoundButton();
                updateLangButton();

                inputDotsContainer.addEventListener('click', handleInputDotClick);
                if (isTouchDevice) {
                    inputDotsContainer.addEventListener('touchstart', function(e) {
                        if (!isMouseInput) return;
                        const dot = e.target.closest('.input-dot');
                        if (!dot) return;
                        e.preventDefault();
                        e.stopPropagation();
                        handleInputDotClick.call(inputDotsContainer, e);
                        touchHandled = true;
                        setTimeout(() => { touchHandled = false; }, 0);
                    }, { passive: false });
                }

                mouseConfirmBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    handleMouseConfirm();
                });

                mouseResetBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (!isMouseInput) return;
                    resetMouseInput();
                    if (state === 'result') {
                        clearAllTimeouts();
                        state = 'idle';
                        setStatus('', '');
                        letterInner.classList.remove('correct', 'error');
                        mainCard.classList.remove('correct-flash', 'error-flash');
                        mouseConfirmBtn.classList.remove('correct', 'error');
                        resetAllDots();
                        updateTargetDots(currentCode, currentDirections);
                        updateInputDots();
                        clearScoreGlow();
                    }
                    if (statusText.textContent === 'Введите позицию' || statusText.textContent === 'Введите символ') {
                        setStatus('', '');
                    }
                    playClickSafe();
                });

                menuBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    menuDropdown.classList.toggle('open');
                    playClickSafe();
                });
                menuBtnAlt.addEventListener('click', e => {
                    e.stopPropagation();
                    menuDropdown.classList.toggle('open');
                    playClickSafe();
                });

                modeItems.forEach(item => {
                    item.addEventListener('click', function(e) {
                        const newMode = this.dataset.mode;
                        if (newMode) switchMode(newMode);
                        playClickSafe();
                    });
                });

                menuHintToggle.addEventListener('click', toggleHint);
                menuInfo.addEventListener('click', () => {
                    window.open(
                        'https://drive.google.com/drive/folders/1ifBkgXc-yeQVHzGPw9zmMTHdrrNAgOrH?usp=sharing',
                        '_blank');
                    menuDropdown.classList.remove('open');
                    playClickSafe();
                });

                menuSoundToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleSound();
                });

                menuLangToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    switchLanguage();
                    menuDropdown.classList.remove('open');
                });

                document.addEventListener('click', e => {
                    if (!menuBtn.contains(e.target) && !menuBtnAlt.contains(e.target) && !menuDropdown.contains(e.target)) {
                        menuDropdown.classList.remove('open');
                    }
                });

                decodingTableWrap.addEventListener('click', function(e) {
                    const td = e.target.closest('td[data-letter]');
                    if (!td) return;
                    if (e.target.closest('.sort-btn')) return;
                    const letter = td.dataset.letter;
                    if (!letter || letter === ' ') return;
                    if (mode === 'receive' && state === 'idle' && !receiveKeyIsDown) {
                        handleMouseReceive(letter);
                    }
                });

                copyPeerIdBtn.addEventListener('click', copyPeerId);
                connectPeerBtn.addEventListener('click', connectToPeer);
                disconnectPeerBtn.addEventListener('click', disconnectPeer);
                remotePeerIdInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') connectToPeer();
                });

                copyPeerIdBtnMenu.addEventListener('click', copyPeerId);
                connectPeerBtnMenu.addEventListener('click', connectToPeer);
                disconnectPeerBtnMenu.addEventListener('click', disconnectPeer);
                remotePeerIdInputMenu.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') connectToPeer();
                });
                remotePeerIdInput.addEventListener('input', function() {
                    remotePeerIdInputMenu.value = remotePeerIdInput.value;
                });
                remotePeerIdInputMenu.addEventListener('input', function() {
                    remotePeerIdInput.value = remotePeerIdInputMenu.value;
                });

                setupTouchChat();

                window.addEventListener('beforeunload', () => {
                    if (peer) peer.destroy();
                });
            }

            init();
        })();
    </script>
</body>
</html>
